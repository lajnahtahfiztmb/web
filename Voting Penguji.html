    @keyframes fadeIn {

      text-align: center;
      min-width: 280px;
    }

    .progress-container {
      width: 100%;
      height: 10px;
      background: #e9f5e6;
      border-radius: 20px;
      overflow: hidden;
      margin: 12px 0;
    }

      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #2d6a4f, #40916c, #52b788);

    }
    
    .loading-percent { font-size: 1.5rem; font-weight: bold; color: #2d6a4f; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e9f5e6;
      border-top: 3px solid #2d6a4f;
      border-radius: 50%;
      margin: 0 auto 12px;
      animation: spin 0.8s linear infinite;
    }

/* Progress bar loading untuk memuat data */
.loading-progress-container {

}

.loading-progress-fill {

}

}


    @keyframes spin {

        { id: 'Lajnah', label: '💻 Lajnah Tahfidz', type: 'section', target: 'LajnahSection' }
      ]
    };

    
    // ========== SIDEBAR ==========
    function renderNavSidebar() {
      const navContainer = document.getElementById('sidebarNavMenu');
      if (!navContainer) return;
      navContainer.innerHTML = '';
      
      let menus = menuForRole.public;
      if (currentUser) {
        menus = (currentUser.role === 'super_admin') ? menuForRole.super_admin : menuForRole.admin_biasa;
      }
      
      menus.forEach(menu => {
        const btn = document.createElement('button');
        btn.className = 'sidebar-btn';
        btn.innerHTML = menu.label;
        btn.onclick = () => {
          if (menu.type === 'link') {
            window.location.href = menu.url;
          } else if (menu.type === 'section') {
            localStorage.setItem('targetSection', menu.target);
            window.location.href = 'index.html';
          }
          closeSidebar();
        };
        navContainer.appendChild(btn);
      });
    }
    
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
      const isOpen = sidebar.classList.contains('open');
      if (isOpen) {
        document.body.classList.add('sidebar-open');
        document.getElementById('hamburgerBtn').innerHTML = '<i class="fas fa-times"></i>';
      } else {
        document.body.classList.remove('sidebar-open');
        document.getElementById('hamburgerBtn').innerHTML = '<i class="fas fa-bars"></i>';
      }
    }
    
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('active');
      document.body.classList.remove('sidebar-open');
      document.getElementById('hamburgerBtn').innerHTML = '<i class="fas fa-bars"></i>';
    }
    
    document.getElementById('hamburgerBtn').addEventListener('click', toggleSidebar);
    document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);
    
    // ========== LOGIN ==========
    function showLoginFormSidebar() {
      if (!currentUser) {
        document.getElementById('loginFormSidebar').style.display = 'block';
        document.getElementById('sidebarLoginBtn').style.display = 'none';
        document.getElementById('loginErrorSidebar').innerHTML = '';
      }
    }
    
    function hideLoginFormSidebar() {
      document.getElementById('loginFormSidebar').style.display = 'none';
      document.getElementById('sidebarLoginBtn').style.display = 'block';
      document.getElementById('loginEmailSidebar').value = '';
      document.getElementById('loginPasswordSidebar').value = '';
    }
    
    let loadingInterval = null;
    let currentProgress = 0;
    
    function showVotingLoading(title, steps = ['Menyiapkan', 'Memproses', 'Menyelesaikan']) {
      hideVotingLoading();
      currentProgress = 0;
      let stepIndex = 0;
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.id = 'votingLoadingOverlay';
      overlay.innerHTML = `
        <div class="loading-card">
          <h3>${title}</h3>
          <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="loading-percent" id="loadingPercent">0%</div>
          <div class="loading-step" id="loadingStep">${steps[0]}<span class="dots"></span></div>
          <div class="loading-text" id="loadingText">Mohon tunggu sebentar...</div>
        </div>
      `;
      document.body.appendChild(overlay);
      loadingInterval = setInterval(() => {
        if (currentProgress < 90) {
          currentProgress += Math.random() * 8;
          if (currentProgress > 90) currentProgress = 90;
          updateVotingProgress(currentProgress);
        }
        const newStepIndex = Math.floor(currentProgress / 30);
        if (newStepIndex !== stepIndex && newStepIndex < steps.length) {
          stepIndex = newStepIndex;
          const stepEl = document.getElementById('loadingStep');
          if (stepEl) stepEl.innerHTML = steps[stepIndex] + '<span class="dots"></span>';
        }
      }, 200);
    }
    
    function updateVotingProgress(percent) {
      const progressBar = document.getElementById('progressBar');
      const percentEl = document.getElementById('loadingPercent');
      if (progressBar) progressBar.style.width = percent + '%';
      if (percentEl) percentEl.innerHTML = Math.floor(percent) + '%';
    }
    
    function completeVotingLoading() {
      if (loadingInterval) clearInterval(loadingInterval);
      updateVotingProgress(100);
      setTimeout(() => { hideVotingLoading(); }, 800);
    }
    
    function hideVotingLoading() {
      if (loadingInterval) { clearInterval(loadingInterval); loadingInterval = null; }
      const overlay = document.getElementById('votingLoadingOverlay');
      if (overlay) overlay.remove();
    }
    
    function doLoginFromSidebar() {
      const login = document.getElementById('loginEmailSidebar').value.trim();
      const password = document.getElementById('loginPasswordSidebar').value;
      if (!login || !password) {
        document.getElementById('loginErrorSidebar').innerHTML = 'Harap isi email/ID dan password';
        return;
      }
      
      showVotingLoading('Login', ['Memeriksa akun', 'Verifikasi password', 'Mengambil data user']);
      
      const callbackName = 'jsonp_callback_' + Date.now();
      window[callbackName] = function(response) {
        delete window[callbackName];
        if (response.success) {
          currentUser = { role: response.role, email: response.email, id: response.id };
          localStorage.setItem('tahfidz_user', JSON.stringify(currentUser));
          completeVotingLoading();
          setTimeout(() => {
            document.getElementById('loginFormSidebar').style.display = 'none';
            document.getElementById('sidebarLoginBtn').style.display = 'none';
            document.getElementById('sidebarLogoutBtn').style.display = 'block';
            updateSidebarUI();
            renderNavSidebar();
            location.reload();
          }, 1000);
        } else {
          completeVotingLoading();
          setTimeout(() => {
            document.getElementById('loginErrorSidebar').innerHTML = response.message || 'Login gagal';
          }, 800);
        }
      };
      
      const url = `${GAS_LOGIN_URL}?callback=${callbackName}&login=${encodeURIComponent(login)}&password=${encodeURIComponent(password)}`;
      const script = document.createElement('script');
      script.src = url;
      document.body.appendChild(script);
    }
    
    function logout() {
      currentUser = null;
      localStorage.removeItem('tahfidz_user');
      updateSidebarUI();
      renderNavSidebar();
      hideLoginFormSidebar();
      location.replace('index.html');
    }
    
    function updateSidebarUI() {
      const userStatusDiv = document.getElementById('userStatusSidebar');
      const loginBtn = document.getElementById('sidebarLoginBtn');
      const logoutBtn = document.getElementById('sidebarLogoutBtn');
      
      if (currentUser) {
        const roleText = currentUser.role === 'super_admin' ? 'Operator' : 'Musammi';
        userStatusDiv.innerHTML = `🎓 ${currentUser.email} (${roleText})`;
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'block';
      } else {
        userStatusDiv.innerHTML = '';
        loginBtn.style.display = 'block';
        logoutBtn.style.display = 'none';
      }
    }
    
    function loadStoredUser() {
      const stored = localStorage.getItem('tahfidz_user');
      if (stored) {
        try {
          currentUser = JSON.parse(stored);
          updateSidebarUI();
          renderNavSidebar();
        } catch(e) { console.error(e); }
      } else {
        updateSidebarUI();
        renderNavSidebar();
      }
    }
    
    function checkAuth() {
      // Tidak memaksa redirect, biarkan user bisa melihat data
    }
    
    // ========== FUNGSI JSONP ==========
    function jsonpRequest(params) {
      return new Promise((resolve, reject) => {
        const callbackName = `jsonp_${Date.now()}_${requestId++}`;
        const url = new URL(GAS_URL);
        
        Object.keys(params).forEach(key => {
          let value = params[key];
          if (Array.isArray(value)) {
            value = JSON.stringify(value);
          }
          url.searchParams.append(key, value);
        });
        url.searchParams.append('callback', callbackName);
        
        const timeout = setTimeout(() => {
          if (window[callbackName]) {
            delete window[callbackName];
            reject(new Error("Request timeout"));
          }
        }, 15000);
        
        window[callbackName] = function(data) {
          clearTimeout(timeout);
          delete window[callbackName];
          if (script.parentNode) document.body.removeChild(script);
          resolve(data);
        };
        
        const script = document.createElement('script');
        script.src = url.toString();
        script.onerror = function() {
          clearTimeout(timeout);
          delete window[callbackName];
          reject(new Error("Network error"));
        };
        
        document.body.appendChild(script);
      });
    }
    
    // ========== AMBIL DAFTAR SHEET ==========
    async function getSheetsFromGas() {
      try {
        const result = await jsonpRequest({ action: "getSheets" });
        if (result && result.success && result.sheets) {
          return result.sheets;
        }
        return [];
      } catch (err) {
        console.error("Gagal ambil daftar sheet:", err);
        return [];
      }
    }
    
    // ========== BACA DATA ==========
    async function fetchData(sheetName) {
      try {
        const result = await jsonpRequest({ 
          action: "read", 
          sheet: sheetName 
        });
        if (result && result.success) {
          return result.data || [];
        } else {
          throw new Error(result && result.message ? result.message : "Gagal ambil data");
        }
      } catch (err) {
        console.error("Fetch error:", err);
        setStatus(err.message, true);
        return null;
      }
    }
    
    // ========== VOTE ==========
    async function vote(kode, namaPenguji) {
      if (!currentUser) {
        setStatus("Silakan login terlebih dahulu untuk melakukan voting!", true);
        return false;
      }
      
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
        autoRefreshInterval = null;
      }
      
      showVotingLoading('Menyimpan Pilihan', ['Mengirim data', 'Memverifikasi', 'Menyimpan ke database']);
      
      try {
        if (!kode || !namaPenguji) {
          setStatus("Nama penguji tidak boleh kosong!", true);
          completeVotingLoading();
          return false;
        }
        
        const result = await jsonpRequest({ 
          action: "vote", 
          kode: kode,
          namaPenguji: namaPenguji,
          sheet: currentSheet
        });
        
        if (result && result.success) {
          completeVotingLoading();
          setStatus(result.message);
          await refreshData();
          return true;
        } else {
          throw new Error(result && result.message ? result.message : "Gagal menyimpan");
        }
      } catch (err) {
        completeVotingLoading();
        setStatus(err.message, true);
        return false;
      } finally {
        startAutoRefresh();
      }
    }
    
    async function refreshData() {
      showLoading(true);
      const data = await fetchData(currentSheet);
      if (data !== null) {
        currentData = data;
        renderTable();
      }
      showLoading(false);
    }
    
    function startAutoRefresh() {
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
      autoRefreshInterval = setInterval(async () => {
        if (currentSheet) {
          const data = await fetchData(currentSheet);
          if (data !== null && JSON.stringify(currentData) !== JSON.stringify(data)) {
            currentData = data;
            renderTable();
          }
        }
      }, 1000);
    }
    
    // ========== TAB SHEET ==========
    function createTabs() {
      const tabsContainer = document.getElementById('tabsContainer');
      if (!tabsContainer) return;
      tabsContainer.innerHTML = '';
      
      if (!sheetsList || sheetsList.length === 0) {
        tabsContainer.style.display = 'none';
        return;
      }
      
      if (sheetsList.length === 1) {
        tabsContainer.style.display = 'none';
        return;
      }
      
      tabsContainer.style.display = 'flex';
      sheetsList.forEach((sheetName) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn';
        if (sheetName === currentSheet) btn.classList.add('active');
        btn.textContent = sheetName;
        btn.onclick = () => switchSheet(sheetName, btn);
        tabsContainer.appendChild(btn);
      });
    }
    
    async function switchSheet(sheetName, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSheet = sheetName;
      
      showLoading(true);
      const data = await fetchData(currentSheet);
      if (data !== null) {
        currentData = data;
        renderTable();
      }
      showLoading(false);
    }
    
    // ========== FILTER & RENDER ==========
    function setStatus(msg, isError = false) {
      const errorArea = document.getElementById('errorArea');
      if (isError) {
        errorArea.style.display = 'block';
        errorArea.innerHTML = `<div style="background:#fef2f2;border-left:4px solid #ef4444;padding:14px 18px;border-radius:10px;color:#b91c1c;margin:20px 0;">❌ ${msg}</div>`;
        setTimeout(() => {
          errorArea.style.display = 'none';
        }, 3000);
      } else {
        errorArea.style.display = 'none';
      }
    }
    
    function escapeHtml(str) {
      if (!str) return "";
      return String(str).replace(/[&<>]/g, function(m) {
        if (m === "&") return "&amp;";
        if (m === "<") return "&lt;";
        if (m === ">") return "&gt;";
        return m;
      });
    }
    
function showLoading(show) {
    const loadingArea = document.getElementById('loadingArea');
    const tableArea = document.getElementById('tableArea');
    
    if (show) {
        loadingArea.style.display = 'block';
        tableArea.style.display = 'none';
        
        // Reset progress bar
        const progressFill = document.getElementById('loadingProgressFill');
        const percentageText = document.getElementById('loadingPercentageText');
        if (progressFill) progressFill.style.width = '0%';
        if (percentageText) percentageText.innerText = '0%';
        
        // Animasi progress bar
        let progress = 0;
        if (window.loadingInterval) clearInterval(window.loadingInterval);
        
        window.loadingInterval = setInterval(() => {
            if (progress < 90) {
                progress += Math.random() * 15;
                if (progress > 90) progress = 90;
                if (progressFill) progressFill.style.width = progress + '%';
                if (percentageText) percentageText.innerText = Math.floor(progress) + '%';
            }
        }, 200);
    } else {
        // Selesaikan progress ke 100%
        const progressFill = document.getElementById('loadingProgressFill');
        const percentageText = document.getElementById('loadingPercentageText');
        if (progressFill) progressFill.style.width = '100%';
        if (percentageText) percentageText.innerText = '100%';
        
        setTimeout(() => {
            loadingArea.style.display = 'none';
            tableArea.style.display = 'block';
            if (window.loadingInterval) clearInterval(window.loadingInterval);
            window.loadingInterval = null;
        }, 500);
    }
}
    
    function applyFilters() {
      renderTable();
    }
    
    function resetFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('statusFilter').value = '';
      renderTable();
    }
    
    function getFilteredData() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
      const statusFilter = document.getElementById('statusFilter').value;
      
      let filtered = [...currentData];
      
      if (searchTerm) {
        filtered = filtered.filter(row => 
          row.peserta && row.peserta.toLowerCase().includes(searchTerm)
        );
      }
      
      if (statusFilter === 'belum') {
        filtered = filtered.filter(row => !row.penguji || row.penguji === "");
      } else if (statusFilter === 'sudah') {
        filtered = filtered.filter(row => row.penguji && row.penguji !== "");
      }
      
      return filtered;
    }
    
    function renderTable() {
      const container = document.getElementById('tableArea');
      const filteredData = getFilteredData();
      
      if (!filteredData.length) {
        container.innerHTML = `
          <div style="text-align: center; padding: 60px 20px; background: #fef2f2; border-radius: 16px; border: 1px solid #fecaca;">
            <i class="fas fa-database" style="font-size: 48px; color: #ef4444; margin-bottom: 16px; display: block;"></i>
            <h3 style="color: #991b1b; margin-bottom: 8px;">Voting belum tersedia</h3>
            <p style="color: #7f1d1d; margin-bottom: 16px;">Saat ini belum ada data voting Penguji atau filter keliru.</p>
            <p style="color: #b91c1c; font-size: 13px;">
              <i class="fas fa-envelope"></i> Silakan hubungi admin untuk menambahkan data.
            </p>
          </div>
        `;
        container.style.display = 'block';
        return;
      }
      
      let html = '';
      
      filteredData.forEach(row => {
        const sudahMemilih = row.penguji && row.penguji !== "";
        const pengujiSekarang = row.penguji || "";
        
        html += `
          <div class="voting-card">
            <div class="card-header">
              <span class="card-kode">📌 Kode: ${escapeHtml(row.kode)}</span>
              <span class="card-status">
                ${sudahMemilih ? 
                  '<span class="status-badge status-sudah">✅ Terisi</span>' : 
                  '<span class="status-badge status-belum">⏳ Masih Kosong</span>'
                }
              </span>
            </div>
            <div class="card-body">
              <div class="info-row">
                <div class="info-label">📚 Santri Ujian: </div>
                <div class="info-value">${escapeHtml(row.peserta)}</div>
              </div>
              <div class="info-row">
                <div class="info-label">🎓 Penguji: </div>
                <div class="info-value">
                  ${sudahMemilih ? 
                    `<span class="penguji-value">${escapeHtml(pengujiSekarang)} ✅</span>` : 
                    '<span style="color:#94a3b8;">⏳ Masih Kosong</span>'
                  }
                </div>
              </div>
              <div class="action-area">
                ${!sudahMemilih ? `
                  ${currentUser ? `
                    <input type="text" id="input-${escapeHtml(row.kode)}" class="vote-input" placeholder="Masukkan Nama Penguji">
                    <button class="vote-btn" onclick="handleVote('${escapeHtml(row.kode)}')">💾 Simpan Pilihan</button>
                  ` : `
                    <span class="locked-text">🔒 Silakan login untuk melakukan voting</span>
                  `}
                ` : `
                  <span class="locked-text">🔒 Sudah terisi dan tidak dapat diubah</span>
                `}
              </div>
            </div>
          </div>
        `;
      });
      
      const dataCount = filteredData.length;
      const filterText = [];
      const searchTerm = document.getElementById('searchInput').value;
      const statusFilter = document.getElementById('statusFilter').value;
      if (searchTerm) filterText.push(`🔍 "${searchTerm}"`);
      if (statusFilter === 'belum') filterText.push(`📋 Status: Masih Kosong`);
      if (statusFilter === 'sudah') filterText.push(`📋 Status: Sudah Diisi`);
      
      const filterBadge = filterText.length ? `<span class="filter-badge">${filterText.join(' + ')}</span>` : '';
      
      const statsHtml = `<div class="stats">
        <span>📊 <strong>${dataCount} Peserta</strong> | Sheet: <strong>${escapeHtml(currentSheet)}</strong></span>
        <span>🕒 Update: ${new Date().toLocaleString('id-ID')}</span>
        ${filterBadge}
      </div>`;
      
      container.innerHTML = html + statsHtml;
      container.style.display = 'block';
    }
    
    window.handleVote = function(kode) {
      if (!currentUser) {
        setStatus("Silakan login terlebih dahulu!", true);
        return;
      }
      
      const input = document.getElementById(`input-${kode}`);
      const namaPenguji = input ? input.value.trim() : "";
      
      if (!namaPenguji) {
        setStatus("Isi Nama Penguji terlebih dahulu!", true);
        return;
      }
      
      if (confirm(`Yakin memilih "${namaPenguji}" untuk peserta kode ${kode}?\n\nPilihan tidak dapat diubah setelah disimpan.`)) {
        vote(kode, namaPenguji);
      }
    };
    
    // ==================== INITIALIZATION ====================
    async function init() {
      loadStoredUser();
      checkAuth();
      
      showLoading(true);
      
      // 1. Ambil daftar sheet dari GAS
      sheetsList = await getSheetsFromGas();
      
      if (sheetsList.length === 0) {
        sheetsList = ['VotingData'];
        currentSheet = 'VotingData';
      } else {
        currentSheet = sheetsList[0];
      }
      
      // 2. Buat tabs
      createTabs();
      
      // 3. Ambil data dari sheet pertama
      const data = await fetchData(currentSheet);
      if (data !== null) {
        currentData = data;
        renderTable();
      }
      
      showLoading(false);
      startAutoRefresh();
    }
    
    init();
  </script>
</body>
