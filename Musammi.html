<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Musammi - TMB</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/png" sizes="32x32" href="pavicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="pavicon.png">
  <link rel="shortcut icon" href="pavicon.png" type="image/png">
  <link rel="apple-touch-icon" href="pavicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f7e8;
      color: #1e3a2f;
      min-height: 100vh;
      overflow-x: hidden;
      width: 100%;
    }
    
    /* ========== SIDEBAR ========== */
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 998;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    
    .sidebar-overlay.active { opacity: 1; visibility: visible; }
    
    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: linear-gradient(135deg, #2d6a4f 0%, #2e7d32 50%, #2d6a4f 100%);
      z-index: 999;
      transition: left 0.3s ease;
      box-shadow: 2px 0 10px rgba(0,0,0,0.2);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    
    .sidebar.open { left: 0; }
    
    .sidebar-header {
      padding: 20px 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    
    .sidebar-logo {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 8px;
      border: 2px solid #ffd966;
    }
    
    .sidebar-header h3 { color: white; font-size: 15px; }
    .sidebar-header p { color: rgba(255,255,255,0.7); font-size: 10px; }
    
    .sidebar-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 12px 16px 12px;
      margin-top: 10px;
    }
    
    .sidebar-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }
    
    .sidebar-btn:hover { background: rgba(255,255,255,0.25); transform: translateX(5px); }
    
    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.15);
      margin-top: auto;
    }
    
    .user-status-sidebar {
      background: rgba(255,255,255,0.12);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.7rem;
      text-align: center;
      color: white;
      margin-bottom: 10px;
    }
    
    .sidebar-login-buttons { display: flex; gap: 8px; }
    
    .sidebar-login-buttons button {
      flex: 1;
      background: white;
      color: #1e4a2f;
      border: none;
      padding: 8px 0;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.75rem;
    }
    
    .sidebar-login-buttons button.logout-btn { background: #ff8a5c; color: white; }
    
    .login-form-sidebar { margin-top: 10px; }
    
    .login-form-sidebar input {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 8px;
      border-radius: 10px;
      border: none;
      font-size: 0.75rem;
    }
    
    .login-form-sidebar button {
      width: 100%;
      background: #ffb74d;
      color: #1e3a2f;
      border: none;
      padding: 8px;
      border-radius: 10px;
      font-weight: bold;
      margin-bottom: 5px;
      cursor: pointer;
    }
    
    .error-msg-sidebar { color: #ffb3b3; font-size: 0.65rem; margin-top: 5px; text-align: center; }
    
    .hamburger-btn {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.3s;
      position: absolute;
      left: 20px;
      top: 20%;
      transform: translateY(-50%);
      z-index: 10;
    }
    
    .hamburger-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-50%) scale(1.05);
    }
    
    .main-container {
      transition: margin-left 0.3s ease;
      width: 100%;
    }
    
    @media (min-width: 769px) {
      body.sidebar-open .main-container { margin-left: 280px; }
    }
    
    /* ========== STYLE KONTEN UTAMA ========== */
    .container {
      max-width: 1400px;
      margin: 20px auto;
      background: white;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(46, 125, 50, 0.25);
      overflow: hidden;
      position: relative;
    }
    
    .header {
      background: linear-gradient(135deg, #2d6a4f 0%, #2e7d32 50%, #2d6a4f 100%);
      color: white;
      padding: 20px 25px;
      text-align: center;
      position: relative;
    }
    
    .logo-circle img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid white;
    }
    
    .header h1 { font-size: 1.8em; margin-bottom: 5px; }
    .header h4 { opacity: 0.85; font-size: 12px; }
    
    .header-refresh {
      display: inline-flex;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      gap: 6px;
      margin-top: 10px;
    }
    
    .content {
      padding: 25px 30px !important;
      min-height: 550px;
      overflow-x: hidden !important;
      word-wrap: break-word !important;
    }
    
    .informasi-content {
      width: 100% !important;
      max-width: 100% !important;
      overflow-x: hidden !important;
      word-break: break-word !important;
      overflow-wrap: break-word !important;
      white-space: normal !important;
    }
    
    .informasi-content table {
      display: block !important;
      width: 100% !important;
      max-width: 100% !important;
      overflow-x: auto !important;
      -webkit-overflow-scrolling: touch;
    }
    
    .informasi-content img {
      max-width: 100% !important;
      height: auto !important;
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      color: #2e7d32;
    }
    
    .loading .fa-file-alt {
      font-size: 48px;
      color: #43a047;
      animation: pulse 1.5s ease-in-out infinite;
      margin-bottom: 15px;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    
    .error {
      background: #fef2f2;
      border-left: 4px solid #ef4444;
      padding: 14px 18px;
      border-radius: 10px;
      color: #b91c1c;
    }
    
    .footer {
      background: #f8fafc;
      padding: 12px;
      text-align: center;
      color: #94a3b8;
      font-size: 11px;
      border-top: 1px solid #e2e8f0;
    }
    
    /* Loading Overlay - pointer events NONE saat hidden */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(3px);
      pointer-events: auto;
    }
    
    .loading-overlay.hidden {
      display: none;
      pointer-events: none;
    }
    
    .loading-card {
      background: white;
      padding: 25px 35px;
      border-radius: 20px;
      text-align: center;
      min-width: 260px;
      max-width: 90%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    
    .loading-card h3 { color: #2d6a4f; margin-bottom: 15px; font-size: 1.1rem; }
    
    .progress-container {
      width: 100%;
      height: 10px;
      background: #e9f5e6;
      border-radius: 20px;
      overflow: hidden;
      margin: 12px 0;
    }
    
    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #2d6a4f, #40916c, #52b788);
      border-radius: 20px;
      transition: width 0.3s ease;
    }
    
    .loading-percent { font-size: 1.5rem; font-weight: bold; color: #2d6a4f; margin: 8px 0; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e9f5e6; border-top: 3px solid #2d6a4f; border-radius: 50%; margin: 0 auto 12px; animation: spin 0.8s linear infinite; }
    .dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes dots { 0%, 20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%, 100% { content: '...'; } }
    
    @media (max-width: 768px) {
      .header h1 { font-size: 1.2em; }
      .content { padding: 18px 12px !important; }
      .hamburger-btn { width: 38px; height: 38px; left: 12px; top: 20%; }
      .logo-circle img { width: 50px; height: 50px; }
    }
    
    @media print {
      .sidebar, .hamburger-btn, .sidebar-overlay, .header-refresh { display: none; }
      .main-container { margin-left: 0; }
      .container { box-shadow: none; border-radius: 0; margin: 0; }
    }
  </style>
</head>

  <script>
    // ========== VARIABEL GLOBAL ==========
    let activeTimeout = null;
    let currentLoadingOverlay = null;
    
    // ========== SIDEBAR TOGGLE (DIPERBAIKI) ==========
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    
    function toggleSidebar() {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('active');
      const isOpen = sidebar.classList.contains('open');
      localStorage.setItem('sidebarState', isOpen ? 'open' : 'closed');
      if (isOpen) {
        document.body.classList.add('sidebar-open');
        if (hamburgerBtn) hamburgerBtn.innerHTML = '<i class="fas fa-times"></i>';
        document.body.style.overflow = 'hidden';
      } else {
        document.body.classList.remove('sidebar-open');
        if (hamburgerBtn) hamburgerBtn.innerHTML = '<i class="fas fa-bars"></i>';
        document.body.style.overflow = '';
      }
    }
    
    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('active');
      document.body.classList.remove('sidebar-open');
      document.body.style.overflow = '';
      localStorage.setItem('sidebarState', 'closed');
      if (hamburgerBtn) hamburgerBtn.innerHTML = '<i class="fas fa-bars"></i>';
    }
    
    // Event listener dengan pengecekan keberadaan elemen
    if (hamburgerBtn) {
      hamburgerBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        toggleSidebar();
      });
    }
    
    if (sidebarOverlay) {
      sidebarOverlay.addEventListener('click', closeSidebar);
    }
    
    // Tutup sidebar saat klik di konten utama (kecuali hamburger)
    const mainContainerEl = document.getElementById('mainContainer');
    if (mainContainerEl) {
      mainContainerEl.addEventListener('click', function(e) {
        if (sidebar.classList.contains('open')) {
          if (!sidebar.contains(e.target) && e.target !== hamburgerBtn && !hamburgerBtn.contains(e.target)) {
            closeSidebar();
          }
        }
      });
    }
    
    function loadSidebarState() {
      const savedState = localStorage.getItem('sidebarState');
      const isDesktop = window.innerWidth > 768;
      if (savedState === 'open' && isDesktop) {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('active');
        document.body.classList.add('sidebar-open');
        if (hamburgerBtn) hamburgerBtn.innerHTML = '<i class="fas fa-times"></i>';
      }
    }
    
    window.addEventListener('resize', () => {
      const isDesktop = window.innerWidth > 768;
      const savedState = localStorage.getItem('sidebarState');
      if (isDesktop && savedState === 'open') {
        sidebar.classList.add('open');
        document.body.classList.add('sidebar-open');
      } else if (!isDesktop) {
        sidebar.classList.remove('open');
        document.body.classList.remove('sidebar-open');
        if (hamburgerBtn) hamburgerBtn.innerHTML = '<i class="fas fa-bars"></i>';
      }
      sidebarOverlay.classList.remove('active');
    });
    
    // ========== LOADING OVERLAY YANG AMAN ==========
    function showLoadingWithProgress(title, steps = ['Menyiapkan', 'Memproses', 'Menyelesaikan']) {
      // Hapus loading overlay yang sudah ada
      hideLoading();
      
      currentProgress = 0;
      let stepIndex = 0;
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.id = 'loadingOverlay';
      overlay.innerHTML = `
        <div class="loading-card">
          <h3>${title}</h3>
          <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="loading-percent" id="loadingPercent">0%</div>
          <div class="loading-step" id="loadingStep">${steps[0]}<span class="dots"></span></div>
          <div class="loading-text" id="loadingText">Mohon tunggu sebentar...</div>
        </div>
      `;
      document.body.appendChild(overlay);
      currentLoadingOverlay = overlay;
      
      // Animasi progress
      if (window.loadingInterval) clearInterval(window.loadingInterval);
      window.loadingInterval = setInterval(() => {
        if (currentProgress < 90) {
          currentProgress += Math.random() * 8;
          if (currentProgress > 90) currentProgress = 90;
          updateProgress(currentProgress);
        }
        const newStepIndex = Math.floor(currentProgress / 30);
        if (newStepIndex !== stepIndex && newStepIndex < steps.length) {
          stepIndex = newStepIndex;
          const stepEl = document.getElementById('loadingStep');
          if (stepEl) stepEl.innerHTML = steps[stepIndex] + '<span class="dots"></span>';
        }
      }, 200);
    }
    
    function updateProgress(percent) {
      const progressBar = document.getElementById('progressBar');
      const percentEl = document.getElementById('loadingPercent');
      if (progressBar) progressBar.style.width = percent + '%';
      if (percentEl) percentEl.innerHTML = Math.floor(percent) + '%';
    }
    
    function completeLoading() {
      if (window.loadingInterval) {
        clearInterval(window.loadingInterval);
        window.loadingInterval = null;
      }
      updateProgress(100);
      setTimeout(() => { hideLoading(); }, 500);
    }
    
    function hideLoading() {
      if (window.loadingInterval) {
        clearInterval(window.loadingInterval);
        window.loadingInterval = null;
      }
      if (currentLoadingOverlay && currentLoadingOverlay.remove) {
        currentLoadingOverlay.remove();
      }
      const existingOverlay = document.getElementById('loadingOverlay');
      if (existingOverlay) existingOverlay.remove();
      currentLoadingOverlay = null;
    }

      ]
    };

    
    function renderNavSidebar() {
      const navContainer = document.getElementById('sidebarNavMenu');
      if (!navContainer) return;
      navContainer.innerHTML = '';
      let menus = currentUser ? (currentUser.role === 'super_admin' ? menuForRole.super_admin : menuForRole.admin_biasa) : menuForRole.public;
      menus.forEach(menu => {
        const btn = document.createElement('button');
        btn.className = 'sidebar-btn';
        btn.innerHTML = menu.label;
        btn.onclick = () => {
          if (menu.type === 'link') window.location.href = menu.url;
          else if (menu.type === 'section') {
            localStorage.setItem('targetSection', menu.target);
            window.location.href = 'index.html';
          }
          closeSidebar();
        };
        navContainer.appendChild(btn);
      });
    }
    
    function showLoginFormSidebar() {
      document.getElementById('loginFormSidebar').style.display = 'block';
      document.getElementById('sidebarLoginBtn').style.display = 'none';
      document.getElementById('loginErrorSidebar').innerHTML = '';
    }
    
    function hideLoginFormSidebar() {
      document.getElementById('loginFormSidebar').style.display = 'none';
      document.getElementById('sidebarLoginBtn').style.display = 'block';
      document.getElementById('loginEmailSidebar').value = '';
      document.getElementById('loginPasswordSidebar').value = '';
    }
    
    function doLoginFromSidebar() {
      const login = document.getElementById('loginEmailSidebar').value.trim();
      const password = document.getElementById('loginPasswordSidebar').value;
      if (!login || !password) {
        document.getElementById('loginErrorSidebar').innerHTML = 'Harap isi email/ID dan password';
        return;
      }
      const callbackName = 'jsonp_callback_' + Date.now();
      window[callbackName] = function(response) {
        delete window[callbackName];
        if (response.success) {
          currentUser = { role: response.role, email: response.email, id: response.id };
          localStorage.setItem('tahfidz_user', JSON.stringify(currentUser));
          updateSidebarUI();
          renderNavSidebar();
          hideLoginFormSidebar();
          location.reload();
        } else {
          document.getElementById('loginErrorSidebar').innerHTML = response.message || 'Login gagal';
        }
      };
      const url = `${GAS_LOGIN_URL}?callback=${callbackName}&login=${encodeURIComponent(login)}&password=${encodeURIComponent(password)}`;
      const script = document.createElement('script'); script.src = url; document.body.appendChild(script);
    }
    
    function logout() {
      currentUser = null;
      localStorage.removeItem('tahfidz_user');
      updateSidebarUI();
      renderNavSidebar();
      location.reload();
    }
    
    function updateSidebarUI() {
      const userStatusDiv = document.getElementById('userStatusSidebar');
      const loginBtn = document.getElementById('sidebarLoginBtn');
      const logoutBtn = document.getElementById('sidebarLogoutBtn');
      if (currentUser) {
        userStatusDiv.innerHTML = `🎓 ${currentUser.email} (${currentUser.role === 'super_admin' ? 'Operator' : 'Musammi'})`;
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'block';
      } else {
        userStatusDiv.innerHTML = '';
        loginBtn.style.display = 'block';
        logoutBtn.style.display = 'none';
      }
    }
    
    function loadStoredUser() {
      const stored = localStorage.getItem('tahfidz_user');
      if (stored) { try { currentUser = JSON.parse(stored); updateSidebarUI(); renderNavSidebar(); } catch(e) {} }
      else { updateSidebarUI(); renderNavSidebar(); }
    }
    
    // ========== LOAD Musammi (DENGAN PENANGANAN ERROR LEBIH BAIK) ==========
    let isInformasiLoading = false;
    
    function loadInformasi() {
      // Cegah loading ganda
      if (isInformasiLoading) return;
      isInformasiLoading = true;
      
      const informasiDiv = document.getElementById('informasiArea');
      informasiDiv.innerHTML = '<div class="loading"><i class="fas fa-file-alt"></i><p>Memuat daftar Musammi...</p></div>';
      
      showLoadingWithProgress('Memuat daftar Musammi', ['Mencari Halaqoh', 'Membuat daftar Musammi', 'Memproses Daftar']);
      
      // Timeout handler - PASTIKAN LOADING HILANG
      const timeoutId = setTimeout(() => {
        if (isInformasiLoading) {
          console.warn('Timeout loading Materi');
          completeLoading();
          informasiDiv.innerHTML = `<div class="error">
            <i class="fas fa-hourglass-half"></i> ⏰ Waktu habis! Server tidak merespons.<br><br>
            <button onclick="loadInformasi()" style="margin-top:15px; padding:8px 20px; background:#2d6a4f; color:white; border:none; border-radius:8px; cursor:pointer;">
              <i class="fas fa-sync-alt"></i> Coba Lagi
            </button>
            <button onclick="location.reload()" style="margin-top:15px; margin-left:10px; padding:8px 20px; background:#ff8a5c; color:white; border:none; border-radius:8px; cursor:pointer;">
              <i class="fas fa-redo-alt"></i> Refresh Halaman
            </button>
          </div>`;
          isInformasiLoading = false;
          // HAPUS CALLBACK jika masih ada
          if (window[currentCallbackName]) delete window[currentCallbackName];
        }
      }, 15000);
      
      const callbackName = 'informasi_callback_' + Date.now();
      window.currentCallbackName = callbackName;
      
      window[callbackName] = function(response) {
        // Hapus timeout
        clearTimeout(timeoutId);
        
        delete window[callbackName];
        const script = document.getElementById('informasiScript_' + callbackName);
        if (script) script.remove();
        
        if (response && response.success) {
          completeLoading();
          setTimeout(() => {
            informasiDiv.innerHTML = '';
            
            const iframe = document.createElement('iframe');
            iframe.style.width = '100%';
            iframe.style.border = 'none';
            iframe.style.overflow = 'auto';
            iframe.style.background = 'white';
            iframe.style.margin = '0';
            iframe.style.padding = '0';
            iframe.style.display = 'block';
            
            informasiDiv.appendChild(iframe);
            
            let content = response.content || '';
            
            // Bersihkan konten
            content = content.replace(/Published\s+using\s+Google\s+Docs/gi, '');
            content = content.replace(/Report\s+abuse/gi, '');
            content = content.replace(/Learn\s+more/gi, '');
            content = content.replace(/Updated\s+automatically\s+every\s+\d+\s+minutes/gi, '');
            content = content.replace(/<footer[\s\S]*?<\/footer>/gi, '');
            content = content.replace(/<div[^>]*class="[^"]*(?:footer|publishing|google)[^"]*"[^>]*>[\s\S]*?<\/div>/gi, '');
            
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            
            const elementsToRemove = [
              'Published using Google Docs',
              'Report abuse',
              'Learn more',
              'Updated automatically every'
            ];
            
            elementsToRemove.forEach(text => {
              const allElements = tempDiv.querySelectorAll('*');
              allElements.forEach(el => {
                if (el.textContent && el.textContent.includes(text)) {
                  el.remove();
                }
              });
            });
            
            const classSelectors = ['.docs-footer', '.publishing', '.google-docs-footer', '.footer'];
            classSelectors.forEach(selector => {
              const elements = tempDiv.querySelectorAll(selector);
              elements.forEach(el => el.remove());
            });
            
            const allLinks = tempDiv.querySelectorAll('a');
            allLinks.forEach(link => {
              if (link.href && (link.href.includes('google.com') || link.href.includes('policies'))) {
                link.remove();
              }
            });
            
            content = tempDiv.innerHTML;
            
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(`
              <!DOCTYPE html>
              <html>
              <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <style>
                  body {
                    font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
                    color: #1e3a2f;
                    background: white;
                    padding: 0 !important;
                    margin: 0 !important;
                    line-height: 1.7;
                  }
                  .informasi-wrapper {
                    padding: 20px 25px !important;
                    max-width: 100% !important;
                    box-sizing: border-box !important;
                  }
                  .docs-footer, .publishing, .google-docs-footer, .footer {
                    display: none !important;
                  }
                  h1, h2, h3, h4, h5, h6 {
                    color: #2d6a4f;
                    margin: 25px 0 12px 0;
                    font-weight: bold;
                  }
                  h1 { font-size: 1.8rem; border-bottom: 2px solid #2d6a4f; padding-bottom: 8px; }
                  h2 { font-size: 1.5rem; }
                  h3 { font-size: 1.3rem; color: #2e7d32; }
                  p { margin-bottom: 12px; text-align: justify; }
                  ul, ol { padding-left: 25px; margin: 10px 0 15px 0; }
                  li { margin-bottom: 5px; }
                  table {
                    display: block;
                    width: 100%;
                    overflow-x: auto;
                    border-collapse: collapse;
                    margin: 15px 0;
                  }
                  table td, table th {
                    border: 1px solid #cbd5e1;
                    padding: 8px 12px;
                  }
                  table th { background: #e9f5e6; }
                  img { max-width: 100%; height: auto; }
                  a { color: #2d6a4f; text-decoration: none; }
                  a:hover { text-decoration: underline; }
                  blockquote {
                    border-left: 4px solid #2d6a4f;
                    margin: 15px 0;
                    padding: 10px 20px;
                    background: #f0f7e8;
                    font-style: italic;
                  }
                  @media (max-width: 768px) {
                    .informasi-wrapper { padding: 12px 15px !important; }
                    h1 { font-size: 1.4rem; }
                    h2 { font-size: 1.2rem; }
                    h3 { font-size: 1.1rem; }
                  }
                </style>
              </head>
              <body>
                <div class="informasi-wrapper">
                  ${content || '<p><i class="fas fa-info-circle"></i> Artikel sedang diperbarui. Silakan coba lagi nanti.</p>'}
                </div>
              </body>
              </html>
            `);
            iframeDoc.close();
            
            const setIframeHeight = () => {
              if (iframeDoc && iframeDoc.body) {
                const height = iframeDoc.body.scrollHeight;
                iframe.style.height = Math.max(height, 300) + 'px';
              }
            };
            
            setTimeout(setIframeHeight, 100);
            window.addEventListener('resize', () => { setTimeout(setIframeHeight, 100); });
            
            isInformasiLoading = false;
          }, 300);
        } else {
          completeLoading();
          setTimeout(() => {
            informasiDiv.innerHTML = `<div class="error">
              <i class="fas fa-exclamation-triangle"></i> ❌ Gagal memuat artikel: ${(response && response.message) || 'Koneksi terputus'}<br><br>
              <button onclick="loadInformasi()" style="margin-top:15px; padding:8px 20px; background:#2d6a4f; color:white; border:none; border-radius:8px; cursor:pointer;">
                <i class="fas fa-sync-alt"></i> Coba Lagi
              </button>
              <button onclick="location.reload()" style="margin-top:15px; margin-left:10px; padding:8px 20px; background:#ff8a5c; color:white; border:none; border-radius:8px; cursor:pointer;">
                <i class="fas fa-redo-alt"></i> Refresh Halaman
              </button>
            </div>`;
            isInformasiLoading = false;
          }, 300);
        }
      };
      
      const script = document.createElement('script');
      script.id = 'informasiScript_' + callbackName;
      script.src = `${GAS_MUSAMMI_URL}?callback=${callbackName}`;
      document.body.appendChild(script);
    }
    
    // ========== INIT ==========
    loadSidebarState();
    loadStoredUser();
    loadInformasi();
  </script>
</body>
</html>
