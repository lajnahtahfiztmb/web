<html lang="id">

  <link rel="icon" type="image/png" sizes="16x16" href="pavicon.png">
  <link rel="shortcut icon" href="pavicon.png" type="image/png">
  <link rel="apple-touch-icon" href="pavicon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f7e8;
      color: #1e3a2f;
      min-height: 100vh;
      overflow-x: hidden !important;
      width: 100%;
      max-width: 100%;
    }
    
    /* ========== LAYOUT SIDEBAR ========== */
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 998;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    
    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: linear-gradient(135deg, #2d6a4f 0%, #2e7d32 50%, #2d6a4f 100%);
      z-index: 999;
      transition: left 0.3s ease;
      box-shadow: 2px 0 10px rgba(0,0,0,0.2);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    
    .sidebar.open {
      left: 0;
    }
    
    .sidebar-header {
      padding: 20px 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
    }
    
    .sidebar-logo {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 8px;
      border: 2px solid #ffd966;
    }
    
    .sidebar-header h3 {
      color: white;
      font-size: 15px;
      margin-bottom: 4px;
    }
    
    .sidebar-header p {
      color: rgba(255,255,255,0.7);
      font-size: 10px;
    }
    
    .sidebar-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 12px 16px 12px;
      flex-shrink: 0;
      margin-top: 10px;
    }
    
    .sidebar-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      width: 100%;
    }
    
    .sidebar-btn i {
      width: 22px;
      font-size: 16px;
    }
    
    .sidebar-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: translateX(5px);
    }
    
    .sidebar-btn.active {
      background: #ffb74d;
      color: #1e3a2f;
    }
    
    .sidebar-footer {
      padding: 12px 12px 18px 12px;
      border-top: 1px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
      margin-top: 10px;
    }
    
    .user-status-sidebar {
      background: rgba(255,255,255,0.12);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.7rem;
      margin-bottom: 10px;
      text-align: center;
      word-break: break-word;
      color: white;
    }
    
    .sidebar-login-buttons {
      display: flex;
      gap: 8px;
    }
    
    .sidebar-login-buttons button {
      flex: 1;
      background: white;
      color: #1e4a2f;
      border: none;
      padding: 8px 0;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.75rem;
    }
    
    .sidebar-login-buttons button.logout-btn {
      background: #ff8a5c;
      color: white;
    }
    
    .login-form-sidebar {
      margin-top: 10px;
    }
    
    .login-form-sidebar input {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 8px;
      border-radius: 10px;
      border: none;
      font-size: 0.75rem;
    }
    
    .login-form-sidebar button {
      width: 100%;
      background: #ffb74d;
      color: #1e3a2f;
      border: none;
      padding: 8px;
      border-radius: 10px;
      font-weight: bold;
      margin-bottom: 5px;
      cursor: pointer;
      font-size: 0.75rem;
    }
    
    .login-form-sidebar .cancel-login {
      background: #6c757d;
      color: white;
    }
    
    .error-msg-sidebar {
      color: #ffb3b3;
      font-size: 0.65rem;
      margin-top: 5px;
      text-align: center;
    }
    
    .hamburger-btn {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.3s;
      position: absolute;
      left: 20px;
      top: 20%;
      transform: translateY(-50%);
    }
    
    .hamburger-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-50%) scale(1.05);
    }
    
    .main-container {
      transition: margin-left 0.3s ease;
      width: 100%;
    }
    
    @media (min-width: 769px) {
      body.sidebar-open .main-container {
        margin-left: 280px;
      }
      .main-container {
        margin-left: 0;
      }
    }
    
    @media (max-width: 768px) {
      .sidebar {
        left: -280px;
      }
      .sidebar.open {
        left: 0;
      }
    }
    
    /* ========== STYLE KONTEN UTAMA ========== */
    .container {
      max-width: 1400px;
      margin: 20px auto;
      background: white;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(46, 125, 50, 0.25);
      overflow: hidden;
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .header {
      background: linear-gradient(135deg, #2d6a4f 0%, #2e7d32 50%, #2d6a4f 100%);
      color: white;
      padding: 20px 25px;
      text-align: center;
      position: relative;
    }
    
    @media (max-width: 768px) {
      .header {
        padding: 16px;
      }
    }
    
    .logo-circle img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid white;
    }
    
    .header h1 {
      font-size: 1.8em;
      margin-bottom: 5px;
      letter-spacing: 0.5px;
    }
    
    .header h4 {
      opacity: 0.85;
      font-size: 12px;
      margin-bottom: 4px;
    }
    
    .header-refresh {
      display: inline-flex;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.3s;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }
    
    .header-refresh:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    
    /* ========== FORM STYLE ========== */
    .config-box {
      background: #e8f5e9;
      padding: 20px;
      border-radius: 16px;
      margin: 20px;
    }
    
    .config-box h4 {
      color: #2e7d32;
      margin-bottom: 15px;
      font-size: 16px;
    }
    
    .form-group {
      display: inline-block;
      margin-right: 20px;
      margin-bottom: 15px;
      vertical-align: top;
    }
    
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 5px;
      color: #1e3a2f;
      font-size: 12px;
    }
    
    select, input, button {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      font-size: 13px;
      font-family: inherit;
      background: white;
    }
    
    select:focus, input:focus {
      outline: none;
      border-color: #2e7d32;
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
    }
    
    select, input {
      width: 200px;
    }
    
    button {
      background: linear-gradient(135deg, #2d6a4f 0%, #2e7d32 50%, #2d6a4f 100%);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
    }
    
    .btn-excel {
      background: #1e6f3f;
      margin-left: 10px;
    }
    
    .btn-excel:hover {
      background: #0d5a32;
    }
    
    hr {
      margin: 20px;
      border: none;
      border-top: 1px solid #e2e8f0;
    }
    
    /* ========== ALERT STYLE ========== */
    .alert-info, .alert-success, .alert-warning, .alert-danger {
      padding: 12px 15px;
      border-radius: 12px;
      margin: 15px 20px;
      border-left: 4px solid;
    }
    
    .alert-info { background: #e3f2fd; color: #1565c0; border-left-color: #2196f3; }
    .alert-success { background: #e8f5e9; color: #2e7d32; border-left-color: #4caf50; }
    .alert-warning { background: #fff8e1; color: #f57c00; border-left-color: #ff9800; }
    .alert-danger { background: #ffebee; color: #c62828; border-left-color: #f44336; }
    
    /* ========== TABLE STYLE ========== */
    .table-wrapper {
      overflow-x: auto;
      margin: 20px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
    }
    
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 12px;
    }
    
    th, td {
      border: 1px solid #e2e8f0;
      padding: 10px 12px;
      text-align: center;
      vertical-align: middle;
    }
    
    th {
      background: linear-gradient(135deg, #2d6a4f 0%, #2e7d32 50%, #2d6a4f 100%);
      color: white;
      font-weight: 700;
    }
    
    .sub-header {
      background: #66bb6a;
    }
    
    .santri-row {
      background: #fafafa;
    }
    
    .santri-row:hover {
      background: #f0fdf4;
    }
    
    .penguji-row {
      background: #fff8e1;
    }
    
    .penguji-row:hover {
      background: #fff3e0;
    }
    
    /* ========== KATEGORI TABLE ========== */
    .daftar-kategori {
      background: #fafafa;
      padding: 20px;
      border-radius: 16px;
      margin: 20px;
      border: 1px solid #e2e8f0;
    }
    
    .daftar-kategori h3 {
      color: #1e3a2f;
      font-size: 16px;
      margin-bottom: 15px;
    }
    
    .kategori-table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
    }
    
    .kategori-table th {
      background: #ff9800;
    }
    
    .kategori-table td {
      text-align: left;
    }
    
    .juz-list {
      font-size: 11px;
      color: #666;
      font-family: monospace;
    }
    
    .beban-penguji-table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
    }
    
    .beban-penguji-table th {
      background: #2e7d32;
    }
    
    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }
    
    .footer {
      background: #f8fafc;
      padding: 12px;
      text-align: center;
      color: #94a3b8;
      font-size: 11px;
      border-top: 1px solid #e2e8f0;
    }
    
    .auth-message {
      text-align: center;
      padding: 60px 20px;
      background: #fff8e1;
      border-radius: 16px;
      margin: 20px;
    }
    
    .auth-message i {
      font-size: 48px;
      color: #f57c00;
      margin-bottom: 16px;
      display: block;
    }
    
    @media (max-width: 768px) {
      .header h1 { font-size: 1.2em; }
      .form-group { display: block; margin-right: 0; }
      select, input { width: 100%; }
      .header-actions { flex-direction: column; gap: 10px; }
      th, td { padding: 6px 8px; font-size: 10px; }
    }
    
    @media print {
      body { background: white; padding: 0; }
      .sidebar, .hamburger-btn, .footer, .config-box, .form-group, button { display: none; }
      .container { box-shadow: none; border-radius: 0; margin: 0; }
    }
    
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(3px);
    }
    
    .loading-card {
      background: white;
      padding: 25px 35px;
      border-radius: 20px;
      text-align: center;
      min-width: 260px;
      max-width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      animation: fadeInUp 0.3s ease;
    }
    
    .loading-card h3 {
      color: #2d6a4f;
      margin-bottom: 15px;
    }
    
    .progress-container {
      width: 100%;
      height: 10px;
      background: #e9f5e6;
      border-radius: 20px;
      overflow: hidden;
      margin: 12px 0;
    }
    
    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #2d6a4f, #40916c, #52b788);
      border-radius: 20px;
      transition: width 0.3s ease;
    }
    
    .loading-percent {
      font-size: 1.5rem;
      font-weight: bold;
      color: #2d6a4f;
      margin: 8px 0;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e9f5e6;
      border-top: 3px solid #2d6a4f;
      border-radius: 50%;
      margin: 0 auto 12px;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
</head>

    // ========== LOADING FUNCTIONS ==========
    function showLoadingWithProgress(title, steps = ['Menyiapkan', 'Memproses', 'Menyelesaikan']) {
      hideLoading();
      currentProgress = 0;
      let stepIndex = 0;
      const overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.id = 'loadingOverlay';
      overlay.innerHTML = `
        <div class="loading-card">
          <h3>${title}</h3>
          <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="loading-percent" id="loadingPercent">0%</div>
          <div class="loading-step" id="loadingStep">${steps[0]}<span class="dots"></span></div>
          <div class="loading-text" id="loadingText">Mohon tunggu sebentar...</div>
        </div>
      `;
      document.body.appendChild(overlay);
      loadingInterval = setInterval(() => {
        if (currentProgress < 90) {
          currentProgress += Math.random() * 8;
          if (currentProgress > 90) currentProgress = 90;
          updateProgress(currentProgress);
        }
        const newStepIndex = Math.floor(currentProgress / 30);
        if (newStepIndex !== stepIndex && newStepIndex < steps.length) {
          stepIndex = newStepIndex;
          const stepEl = document.getElementById('loadingStep');
          if (stepEl) stepEl.innerHTML = steps[stepIndex] + '<span class="dots"></span>';
        }
      }, 200);
    }
    
    function updateProgress(percent) {
      const progressBar = document.getElementById('progressBar');
      const percentEl = document.getElementById('loadingPercent');
      if (progressBar) progressBar.style.width = percent + '%';
      if (percentEl) percentEl.innerHTML = Math.floor(percent) + '%';
    }
    
    function completeLoading() { setTimeout(() => hideLoading(), 800); }
    
    function hideLoading() {
      if (loadingInterval) clearInterval(loadingInterval);
      const overlay = document.getElementById('loadingOverlay');
      if (overlay) overlay.remove();
    }

    function parseDataSheet(rows) {
      if (!rows || rows.length < 2) throw new Error("Data kosong");
      const header = rows[0];
      let idxNama = -1, idxKelas = -1;
      const idxJuz = {};
      for (let i = 0; i < header.length; i++) {
        const h = String(header[i]).trim();
        if (h === "Nama") idxNama = i;
        else if (h === "Kelas") idxKelas = i;
        else if (!isNaN(parseInt(h)) && parseInt(h) >= 1 && parseInt(h) <= 30) idxJuz[parseInt(h)] = i;
      }
      if (idxNama === -1) throw new Error("Kolom Nama tidak ditemukan");
      
      const santri = [];
      for (let r = 1; r < rows.length; r++) {
        const row = rows[r];
        if (!row[idxNama] || String(row[idxNama]).trim() === "") continue;
        const nama = String(row[idxNama]).trim();
        const kelas = idxKelas >= 0 ? String(row[idxKelas] || "").trim() : "";
        const juzList = [];
        for (let j = 1; j <= 30; j++) {
          if (idxJuz[j] !== undefined && row[idxJuz[j]] !== undefined && row[idxJuz[j]] !== "") {
            const val = parseInt(row[idxJuz[j]]);
            if (val === j) juzList.push(j);
          }
        }
        juzList.sort((a,b) => a - b);
        santri.push({ nama, kelas, totalJuz: juzList.length, juzList, pengujiAssign: null });
      }
      
      function extractAngkaKelas(kelas) {
        const match = String(kelas).match(/\d+/);
        return match ? parseInt(match[0]) : 0;
      }
      
      santri.sort((a,b) => {
        const kelasA = extractAngkaKelas(a.kelas);
        const kelasB = extractAngkaKelas(b.kelas);
        if (kelasA !== kelasB) return kelasB - kelasA;
        return a.nama.localeCompare(b.nama);
      });
      
      return santri;
    }
    
    function distribusiJuzPerSantri(santri, hari) {
      const juzList = [...santri.juzList];
      const total = juzList.length;
      const perHari = Array(hari).fill().map(() => []);
      
      if (total === 0) return perHari;
      if (total <= hari) {
        for (let i = 0; i < total; i++) perHari[i].push(juzList[i]);
      } else {
        let base = Math.floor(total / hari);
        let sisa = total % hari;
        const perHariCount = Array(hari).fill(base);
        for (let i = 0; i < sisa; i++) perHariCount[hari - 1 - i]++;
        
        let pointer = 0;
        for (let h = 0; h < hari; h++) {
          for (let k = 0; k < perHariCount[h]; k++) {
            if (pointer < juzList.length) {
              perHari[h].push(juzList[pointer]);
              pointer++;
            }
          }
        }
      }
      return perHari;
    }
    
    function assignPengujiPrioritas(santriList, pengujiCount, maxJuzTotal) {
      const santriBanyak = santriList.filter(s => s.totalJuz > 2).sort((a,b) => b.totalJuz - a.totalJuz);
      const santriSedikit = santriList.filter(s => s.totalJuz <= 2).sort((a,b) => b.totalJuz - a.totalJuz);
      
      let beban = Array(pengujiCount).fill(0);
      let assigned = Array(pengujiCount).fill().map(() => []);
      
      for (const s of santriBanyak) {
        let minIdx = 0;
        for (let i = 1; i < pengujiCount; i++) {
          if (beban[i] < beban[minIdx]) minIdx = i;
        }
        if (maxJuzTotal && beban[minIdx] + s.totalJuz > maxJuzTotal) {
          s.pengujiAssign = null;
          continue;
        }
        s.pengujiAssign = minIdx;
        beban[minIdx] += s.totalJuz;
        assigned[minIdx].push(s);
      }
      
      let totalJuz = beban.reduce((a,b) => a + b, 0);
      let targetIdeal = Math.ceil(totalJuz / pengujiCount);
      
      for (let i = 0; i < pengujiCount; i++) {
        if (beban[i] <= targetIdeal) continue;
        let selisih = beban[i] - targetIdeal;
        let santriPenguji = [...assigned[i]].sort((a,b) => a.totalJuz - b.totalJuz);
        for (let s of santriPenguji) {
          if (selisih <= 0) break;
          for (let j = 0; j < pengujiCount; j++) {
            if (j === i) continue;
            if (beban[j] + s.totalJuz <= targetIdeal) {
              const index = assigned[i].indexOf(s);
              if (index !== -1) assigned[i].splice(index, 1);
              assigned[j].push(s);
              beban[i] -= s.totalJuz;
              beban[j] += s.totalJuz;
              s.pengujiAssign = j;
              selisih -= s.totalJuz;
              break;
            }
          }
        }
      }
      
      for (const s of santriSedikit) {
        let minIdx = 0;
        for (let i = 1; i < pengujiCount; i++) {
          if (beban[i] < beban[minIdx]) minIdx = i;
        }
        if (maxJuzTotal && beban[minIdx] + s.totalJuz > maxJuzTotal) {
          s.pengujiAssign = null;
          continue;
        }
        s.pengujiAssign = minIdx;
        beban[minIdx] += s.totalJuz;
        assigned[minIdx].push(s);
      }
      
      let tidakDapat = santriList.filter(s => s.pengujiAssign === null && s.totalJuz > 0);
      return { santriList, bebanPenguji: beban, assigned, santriTidakDapat: tidakDapat };
    }
    
    function jadwalkanFleksibel(juzPerHariPerSantri, sesi, pengujiCount, hariCount) {
      const jadwal = Array(hariCount).fill().map(() => Array(sesi).fill().map(() => Array(pengujiCount).fill(null)));
      const gagal = new Map();
      const maxTanpaDeret = Math.ceil(sesi / 2);
      const juzSudahTerjadwal = new Set();
      const kapasitasTersisa = Array(hariCount).fill().map(() => Array(pengujiCount).fill(sesi));
      
      let semuaJuz = [];
      for (const s of juzPerHariPerSantri) {
        if (s.pengujiAssign === null) continue;
        for (let h = 0; h < hariCount; h++) {
          for (const juz of s.juzPerHari[h]) {
            semuaJuz.push({
              santri: s.nama,
              obj: s,
              juz: juz,
              penguji: s.pengujiAssign,
              key: s.nama + "|" + juz,
              originalHari: h
            });
          }
        }
      }
      
      semuaJuz.sort((a,b) => {
        const aCount = juzPerHariPerSantri.find(s => s.nama === a.santri)?.totalJuz || 0;
        const bCount = juzPerHariPerSantri.find(s => s.nama === b.santri)?.totalJuz || 0;
        return bCount - aCount;
      });
      
      const lastSesiPerHari = new Map();
      
      for (const u of semuaJuz) {
        if (juzSudahTerjadwal.has(u.key)) continue;
        
        let hariOptions = [u.originalHari];
        for (let h = 0; h < hariCount; h++) {
          if (h !== u.originalHari) hariOptions.push(h);
        }
        
        let placed = false;
        let alasan = "";
        
        for (const h of hariOptions) {
          if (kapasitasTersisa[h][u.penguji] <= 0) {
            alasan = "Kapasitas penguji " + getPengujiName(u.penguji) + " di hari " + (h+1) + " penuh";
            continue;
          }
          
          const lastKey = u.santri + "|" + u.penguji + "|" + h;
          const lastSesi = lastSesiPerHari.get(lastKey);
          const juzCountHariIni = juzPerHariPerSantri.find(s => s.nama === u.santri)?.juzPerHari[h]?.length || 0;
          const bolehBerderet = (juzCountHariIni > maxTanpaDeret);
          
          let slotDitemukan = -1;
          for (let s = 0; s < sesi; s++) {
            if (!bolehBerderet && lastSesi !== undefined && Math.abs(lastSesi - s) === 1) continue;
            if (jadwal[h][s][u.penguji] === null) {
              slotDitemukan = s;
              break;
            }
          }
          
          if (slotDitemukan !== -1) {
            jadwal[h][slotDitemukan][u.penguji] = {
              santri: u.santri,
              juz: u.juz,
              kelas: u.obj.kelas
            };
            lastSesiPerHari.set(lastKey, slotDitemukan);
            kapasitasTersisa[h][u.penguji]--;
            juzSudahTerjadwal.add(u.key);
            placed = true;
            break;
          } else {
            alasan = "Tidak ada slot sesi di hari " + (h+1) + " untuk penguji " + getPengujiName(u.penguji);
          }
        }
        
        if (!placed && !gagal.has(u.santri)) {
          gagal.set(u.santri, u.santri + " - Juz " + u.juz + " gagal: " + alasan);
        }
      }
      
      return { jadwal, santriGagal: gagal };
    }
    
    function tampilkanJadwal(jadwal, santriList, hari, sesi, pengujiCount) {

    function tampilkanBebanPenguji(bebanPenguji, assigned, pengujiCount, maxJuzTotal) {
      let totalJuz = bebanPenguji.reduce((a,b) => a + b, 0);
      let targetIdeal = Math.ceil(totalJuz / pengujiCount);
      let selisihMax = Math.max(...bebanPenguji) - Math.min(...bebanPenguji);
      
      let html = '<div class="alert-info" style="margin-top:20px;">';
      html += '<div class="header-actions">';
      html += '<h4><i class="fas fa-chart-bar"></i> Beban Penguji (Total Juz per Periode Ujian)</h4>';
      html += '<button class="btn-excel" id="downloadBebanPengujiBtn">📥 Download Excel</button>';
      html += '</div>';
      html += '<table class="beban-penguji-table"><thead><tr><th>Penguji</th><th>Total Juz</th><th>Santri</th><th>Selisih dari Ideal (' + targetIdeal + ')</th></tr></thead><tbody>';
      
      for (let i = 0; i < pengujiCount; i++) {
        let selisih = bebanPenguji[i] - targetIdeal;
        let selisihText = selisih === 0 ? '✅ Rata' : (selisih > 0 ? '+' + selisih : selisih.toString());
        let warna = selisih === 0 ? 'style="color:green"' : (selisih > 0 ? 'style="color:red"' : 'style="color:orange"');
        
        let santriList = assigned[i] || [];
        let santriText = santriList.map(s => s.nama + ' (' + s.totalJuz + ')').join(', ');
        if (santriText === '') santriText = '-';
        
        html += '<tr>';
        html += '<td><strong>' + getPengujiName(i) + '</strong></td>';
        html += '<td>' + bebanPenguji[i] + ' juz</td>';
        html += '<td style="text-align:left; font-size:11px;">' + santriText + '</td>';
        html += '<td ' + warna + '>' + selisihText + '</td>';
        html += '</tr>';
      }
      html += '<tr style="background:#e8f5e9;"><td><strong>Total</strong></td><td colspan="3"><strong>' + totalJuz + ' juz</strong></td></tr>';
      html += '<tr><td colspan="4" style="text-align:center; font-weight:bold;">📌 Selisih maksimal antar penguji: ' + selisihMax + ' juz' + (selisihMax <= 1 ? ' ✅ (Sudah Rata)' : ' ⚠️ (Belum Rata)') + '</td></tr>';
      html += '</tbody><td></div>';
      
      return html;
    }
    
    function tampilkanKategori(tidakIkut, tidakDapat, gagalMap, penguji, maxJuz) {
      let html = '';
      
      if (tidakIkut && tidakIkut.length > 0) {
        html += '<div class="daftar-kategori" id="kategoriTidakIkut">';
        html += '<div class="header-actions"><h3><i class="fas fa-user-slash"></i> Santri Tidak Ikut Ujian (Juz = 0)</h3>';
        html += '<button class="btn-excel" id="downloadTidakIkutBtn">📥 Download Excel</button></div>';
        html += '<table class="kategori-table"><thead><tr><th>No</th><th>Nama</th><th>Kelas</th></tr></thead><tbody>';
        for (let i = 0; i < tidakIkut.length; i++) {
          html += '<tr><td>' + (i+1) + '</td><td>' + tidakIkut[i].nama + '</td><td>' + tidakIkut[i].kelas + '</td></tr>';
        }
        html += '</tbody></table></div>';
      }
      
      if (tidakDapat && tidakDapat.length > 0) {
        html += '<div class="daftar-kategori" id="kategoriTidakDapat">';
        html += '<div class="header-actions"><h3><i class="fas fa-exclamation-triangle"></i> Santri Tidak Mendapat Penguji</h3>';
        html += '<button class="btn-excel" id="downloadTidakDapatBtn">📥 Download Excel</button></div>';
        html += '<table class="kategori-table"><thead><tr><th>No</th><th>Nama</th><th>Kelas</th><th>Juz</th><th>Juz Spesifik</th><th>Penyebab</th></tr></thead><tbody>';
        for (let i = 0; i < tidakDapat.length; i++) {
          html += '<tr>';
          html += '<td>' + (i+1) + '</td>';
          html += '<td>' + tidakDapat[i].nama + '</td>';
          html += '<td>' + tidakDapat[i].kelas + '</td>';
          html += '<td>' + tidakDapat[i].totalJuz + '</td>';
          html += '<td class="juz-list">' + tidakDapat[i].juzList.join(', ') + '</td>';
          html += '<td style="color:#c62828;">Melebihi batas maksimal juz per penguji (' + penguji + ' penguji × ' + (maxJuz || '∞') + ' juz)</td>';
          html += '</tr>';
        }
        html += '</tbody></table></div>';
      }
      
      if (gagalMap && gagalMap.size > 0) {
        html += '<div class="daftar-kategori" id="kategoriGagal">';
        html += '<div class="header-actions"><h3><i class="fas fa-times-circle"></i> Santri Gagal Dijadwalkan (' + gagalMap.size + ' santri)</h3>';
        html += '<button class="btn-excel" id="downloadGagalBtn">📥 Download Excel</button></div>';
        html += '<table class="kategori-table"><thead><tr><th>No</th><th>Nama</th><th>Kelas</th><th>Juz</th><th>Juz Spesifik</th><th>Penyebab</th></tr></thead><tbody>';
        let i = 0;
        for (let [nama, alasan] of gagalMap) {
          const s = rawSantriList.find(x => x.nama === nama) || { nama: nama, kelas: '-', totalJuz: 0, juzList: [] };
          html += '<tr>';
          html += '<td>' + (i+1) + '</td>';
          html += '<td>' + s.nama + '</td>';
          html += '<td>' + s.kelas + '</td>';
          html += '<td>' + s.totalJuz + '<td>';
          html += '<td class="juz-list">' + s.juzList.join(', ') + '</td>';
          html += '<td style="color:#c62828;">' + alasan + '</td>';
          html += '</tr>';
          i++;
        }
        html += '</tbody></table></div>';
      }
      
      return html;
    }
    
    function downloadKategoriExcel(kategori) {
      if (!lastGenerateData) return;
      
      let data = [];
      let sheetName = "";
      
      if (kategori === 'tidakIkut') {
        data = lastGenerateData.tidakIkut;
        sheetName = 'Santri Tidak Ikut';
      } else if (kategori === 'tidakDapat') {
        data = lastGenerateData.tidakDapat;
        sheetName = 'Santri Tidak Dapat Penguji';
      } else if (kategori === 'gagal') {
        data = lastGenerateData.gagalList || [];
        sheetName = 'Santri Gagal Dijadwalkan';
      }
      
      if (!data.length) return;
      
      sheetName = trimSheetName(sheetName);
      let excelData = [];
      
      if (kategori === 'tidakIkut') {
        excelData = [['No', 'Nama', 'Kelas']];
        data.forEach(function(item, i) {
          excelData.push([i+1, item.nama, item.kelas]);
        });
      } else {
        excelData = [['No', 'Nama', 'Kelas', 'Jumlah Juz', 'Juz Spesifik', 'Penyebab']];
        data.forEach(function(item, i) {
          let penyebab = (kategori === 'tidakDapat') ? 'Melebihi batas maksimal juz per penguji' : item.alasan;
          excelData.push([i+1, item.nama, item.kelas, item.totalJuz, item.juzList.join(', '), penyebab]);
        });
      }
      
      const ws = XLSX.utils.aoa_to_sheet(excelData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      XLSX.writeFile(wb, sheetName + '.xlsx');
    }
    
    function downloadJadwalExcel() {
      if (!lastGenerateData) {
        alert("Belum ada data jadwal. Generate terlebih dahulu!");
        return;
      }
      
      const data = lastGenerateData;
      const jadwal = data.jadwal;
      const santriList = data.berhasil;
      const hari = data.hari;
      const sesi = data.sesi;
      const pengujiCount = data.penguji;
      let sheetName = data.sheetName;
      
      sheetName = trimSheetName(sheetName);
      const excelData = [];
      
      const row1 = ['No', 'Nama', 'Kelas', 'Juz'];
      for (let h = 0; h < hari; h++) {
        for (let s = 0; s < sesi; s++) {
          row1.push(s === 0 ? 'Hari ' + (h+1) : '');
        }
      }
      excelData.push(row1);
      
      const row2 = ['', '', '', ''];
      for (let h = 0; h < hari; h++) {
        for (let s = 0; s < sesi; s++) {
          row2.push((s+1).toString());
        }
      }
      excelData.push(row2);
      
      for (let i = 0; i < santriList.length; i++) {
        const s = santriList[i];
        
        const rowJuz = [i+1, s.nama, s.kelas, s.totalJuz];
        for (let h = 0; h < hari; h++) {
          for (let ses = 0; ses < sesi; ses++) {
            let ujian = null;
            if (jadwal[h] && jadwal[h][ses]) {
              for (let p = 0; p < pengujiCount; p++) {
                if (jadwal[h][ses][p] && jadwal[h][ses][p].santri === s.nama) {
                  ujian = jadwal[h][ses][p];
                  break;
                }
              }
            }
            rowJuz.push(ujian ? ujian.juz : '');
          }
        }
        excelData.push(rowJuz);
        
        const rowPeng = ['', '', '', ''];
        for (let h = 0; h < hari; h++) {
          for (let ses = 0; ses < sesi; ses++) {
            let peng = '';
            if (s.pengujiAssign !== null && jadwal[h] && jadwal[h][ses]) {
              for (let p = 0; p < pengujiCount; p++) {
                if (jadwal[h][ses][p] && jadwal[h][ses][p].santri === s.nama) {
                  peng = getPengujiName(p);
                  break;
                }
              }
            }
            rowPeng.push(peng);
          }
        }
        excelData.push(rowPeng);
      }
      
      const ws = XLSX.utils.aoa_to_sheet(excelData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      XLSX.writeFile(wb, sheetName + '.xlsx');
    }
    
    function downloadBebanPengujiExcel() {
      if (!lastGenerateData) {
        alert("Belum ada data. Generate jadwal terlebih dahulu!");
        return;
      }
      
      const data = lastGenerateData;
      const bebanPenguji = data.bebanPenguji;
      const assigned = data.assigned;
      const pengujiCount = data.penguji;
      let sheetName = 'Beban_Penguji_' + data.sheetName.replace('Jadwal_', '');
      
      sheetName = trimSheetName(sheetName);
      let totalJuz = bebanPenguji.reduce((a,b) => a + b, 0);
      let targetIdeal = Math.ceil(totalJuz / pengujiCount);
      
      const excelData = [['Penguji', 'Total Juz', 'Santri (Juz)', 'Selisih dari Ideal (' + targetIdeal + ')']];
      
      for (let i = 0; i < pengujiCount; i++) {
        let selisih = bebanPenguji[i] - targetIdeal;
        let selisihText = selisih === 0 ? 'Rata' : (selisih > 0 ? '+' + selisih : selisih.toString());
        let santriList = assigned[i] || [];
        let santriText = santriList.map(s => s.nama + ' (' + s.totalJuz + ')').join(', ');
        if (santriText === '') santriText = '-';
        excelData.push([getPengujiName(i), bebanPenguji[i] + ' juz', santriText, selisihText]);
      }
      
      excelData.push(['Total', totalJuz + ' juz', '', '']);
      excelData.push(['', 'Selisih maksimal antar penguji: ' + (Math.max(...bebanPenguji) - Math.min(...bebanPenguji)) + ' juz', '', '']);
      
      const ws = XLSX.utils.aoa_to_sheet(excelData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      XLSX.writeFile(wb, sheetName + '.xlsx');
    }
    
    async function generateJadwal() {
      const sheetName = document.getElementById('sheetSelect').value;
      if (!sheetName) { alert("Pilih sheet terlebih dahulu!"); return; }
      
      showLoadingWithProgress('Membuat Jadwal', ['Membaca data', 'Memproses distribusi', 'Menyusun jadwal']);
      
      const rows = await bacaDataSheet(sheetName);
      if (!rows) { hideLoading(); return; }
      
      let santri;
      try { 
        santri = parseDataSheet(rows); 
        rawSantriList = santri; 
      } catch (err) { 
        hideLoading();
        document.getElementById('errorArea').innerHTML = '<div class="alert-warning">❌ ' + err.message + '</div>'; 
        return; 
      }
      
      const hari = parseInt(document.getElementById('jumlahHari').value);
      const sesi = parseInt(document.getElementById('jumlahSesi').value);
      const penguji = parseInt(document.getElementById('jumlahPenguji').value);
      const maxJuz = document.getElementById('maxJuzPerPenguji').value ? parseInt(document.getElementById('maxJuzPerPenguji').value) : null;
      
      const tidakIkut = santri.filter(s => s.totalJuz === 0);
      const ikut = santri.filter(s => s.totalJuz > 0);
      
      const { santriList: withPenguji, bebanPenguji, assigned, santriTidakDapat } = assignPengujiPrioritas(ikut, penguji, maxJuz);
      const sorted = [...withPenguji].sort((a,b) => b.totalJuz - a.totalJuz);
      const juzPerHari = [];
      
      for (const s of sorted) {
        const perHari = distribusiJuzPerSantri(s, hari);
        juzPerHari.push({ 
          nama: s.nama, 
          kelas: s.kelas, 
          totalJuz: s.totalJuz, 
          juzList: s.juzList,
          pengujiAssign: s.pengujiAssign, 
          juzPerHari: perHari 
        });
      }
      
      const { jadwal, santriGagal } = jadwalkanFleksibel(juzPerHari, sesi, penguji, hari);
      const berhasil = juzPerHari.filter(s => !santriGagal.has(s.nama));
      
      function extractAngkaKelas(kelas) {
        const match = String(kelas).match(/\d+/);
        return match ? parseInt(match[0]) : 0;
      }
      
      berhasil.sort((a,b) => {
        const kelasA = extractAngkaKelas(a.kelas);
        const kelasB = extractAngkaKelas(b.kelas);
        if (kelasA !== kelasB) return kelasB - kelasA;
        return a.nama.localeCompare(b.nama);
      });
      
      const gagalList = [];
      for (let [nama, alasan] of santriGagal) {
        const s = rawSantriList.find(x => x.nama === nama) || { nama: nama, kelas: '-', totalJuz: 0, juzList: [] };
        gagalList.push({ nama: s.nama, kelas: s.kelas, totalJuz: s.totalJuz, juzList: s.juzList, alasan: alasan });
      }
      
      lastGenerateData = {
        tidakIkut: tidakIkut,
        tidakDapat: santriTidakDapat,
        gagalList: gagalList,
        jadwal: jadwal, 
        berhasil: berhasil, 
        hari: hari, 
        sesi: sesi, 
        penguji: penguji, 
        sheetName: 'Jadwal_' + sheetName,
        maxJuz: maxJuz,
        assigned: assigned,
        bebanPenguji: bebanPenguji
      };
      
      document.getElementById('bebanPengujiArea').innerHTML = tampilkanBebanPenguji(bebanPenguji, assigned, penguji, maxJuz);
      
      const jadwalHtml = tampilkanJadwal(jadwal, berhasil, hari, sesi, penguji);
      const downloadBtn = '<div style="text-align:right; margin-top:10px;"><button class="btn-excel" id="downloadJadwalBtn"><i class="fas fa-file-excel"></i> Download Jadwal Excel</button></div>';
      document.getElementById('jadwalArea').innerHTML = jadwalHtml + downloadBtn;
      document.getElementById('kategoriArea').innerHTML = tampilkanKategori(tidakIkut, santriTidakDapat, santriGagal, penguji, maxJuz);
      
      setTimeout(function() {
        const bebanPengujiBtn = document.getElementById('downloadBebanPengujiBtn');
        if (bebanPengujiBtn) bebanPengujiBtn.onclick = downloadBebanPengujiExcel;
        const jadwalBtn = document.getElementById('downloadJadwalBtn');
        if (jadwalBtn) jadwalBtn.onclick = downloadJadwalExcel;
        const tidakIkutBtn = document.getElementById('downloadTidakIkutBtn');
        if (tidakIkutBtn) tidakIkutBtn.onclick = function() { downloadKategoriExcel('tidakIkut'); };
        const tidakDapatBtn = document.getElementById('downloadTidakDapatBtn');
        if (tidakDapatBtn) tidakDapatBtn.onclick = function() { downloadKategoriExcel('tidakDapat'); };
        const gagalBtn = document.getElementById('downloadGagalBtn');
        if (gagalBtn) gagalBtn.onclick = function() { downloadKategoriExcel('gagal'); };
      }, 50);
      
      let totalSeharusnya = withPenguji.reduce((s, x) => s + x.totalJuz, 0);
      let totalTerjadwal = berhasil.reduce((s, x) => {
        let sum = 0;
        for (let h = 0; h < hari; h++) sum += x.juzPerHari[h].length;
        return s + sum;
      }, 0);
      
      document.getElementById('infoArea').innerHTML = '<div class="alert-success">✅ Generate Berhasil! Santri berhasil: ' + berhasil.length + ' dari ' + santri.length + ' (' + totalTerjadwal + '/' + totalSeharusnya + ' juz)</div>';
      document.getElementById('errorArea').innerHTML = '';
      
      hideLoading();
    }
    
    // ========== SHOW MAIN CONTENT (HANYA UNTUK SUPER ADMIN) ==========

          <div class="auth-message">
            <i class="fas fa-lock"></i>
            <h3 style="color: #f57c00;">🔒 Akses Ditolak</h3>
            <p style="margin-top: 10px; color: #666;">Fitur Generator Jadwal Ujian hanya untuk <strong>Super Admin</strong>.</p>
            <p style="margin-top: 5px; font-size: 13px; color: #888;">Anda akan dialihkan ke halaman utama dalam 3 detik...</p>
            <div class="spinner" style="margin-top: 20px;"></div>
          </div>
        `;
        
        // Redirect ke index.html setelah 3 detik
        setTimeout(function() {
          window.location.href = 'index.html';
        }, 3000);
        return;
      }
      
      // Tampilkan konten generator jadwal untuk Super Admin
      mainContent.innerHTML = `
        <div class="config-box">

          <div class="form-group">
            <label>📑 Pilih Sheet (Ujian)</label>
            <select id="sheetSelect" style="width:250px;">
              <option value="">-- Muat daftar sheet dulu --</option>
            </select>
            <button id="loadSheetsBtn" style="margin-left:10px;"><i class="fas fa-sync-alt"></i> Muat</button>
          </div>
        </div>
        
        <hr>
        
        <div style="padding: 0 20px;">
          <h2 style="color: #2e7d32; font-size: 18px; margin-bottom: 15px;">🎯 Parameter Jadwal</h2>
          <div class="form-group"><label>📅 Jumlah Hari</label><input type="number" id="jumlahHari" min="1" value="6"></div>
          <div class="form-group"><label>⏰ Sesi per Hari</label><input type="number" id="jumlahSesi" min="1" value="6"></div>
          <div class="form-group"><label>👨‍🏫 Jumlah Penguji</label><input type="number" id="jumlahPenguji" min="1" value="6"></div>
          <div class="form-group"><label>⚖️ Maks Juz per Penguji</label><input type="number" id="maxJuzPerPenguji" value="" placeholder="Kosong"></div>
          <div><button id="generateBtn"><i class="fas fa-magic"></i> Generate Jadwal</button></div>
        </div>
        
        <div id="errorArea"></div>
        <div id="infoArea"></div>
        <div id="bebanPengujiArea"></div>
        <div id="jadwalArea"></div>
        <div id="kategoriArea"></div>
      `;
      
      const loadBtn = document.getElementById('loadSheetsBtn');
      if (loadBtn) loadBtn.addEventListener('click', loadSheets);
      
      const generateBtn = document.getElementById('generateBtn');
      if (generateBtn) generateBtn.addEventListener('click', generateJadwal);
    }
    
    // ========== INITIALIZATION ==========
    function init() {

      // Cek akses super admin, jika tidak maka redirect
      if (!currentUser || currentUser.role !== 'super_admin') {

        const mainContent = document.getElementById('mainContent');

    init();
  </script>
