<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Jadwal Penguji - TMB</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<!-- Favicon / Logo di Tab Browser -->
<link rel="icon" type="image/png" sizes="32x32" href="pavicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="pavicon.png">
<link rel="shortcut icon" href="pavicon.png" type="image/png">
<link rel="apple-touch-icon" href="pavicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f7e8;
      color: #1e3a2f;
      min-height: 100vh;
      overflow-x: hidden !important;
      width: 100%;
      max-width: 100%;
    }
    
    /* ========== LAYOUT SIDEBAR ========== */
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 998;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    
    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: linear-gradient(135deg, #2d6a4f 0%, #2e7d32 50%, #2d6a4f 100%);
      z-index: 999;
      transition: left 0.3s ease;
      box-shadow: 2px 0 10px rgba(0,0,0,0.2);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    
    .sidebar.open {
      left: 0;
    }
    
    .sidebar-header {
      padding: 20px 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
    }
    
    .sidebar-logo {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 8px;
      border: 2px solid #ffd966;
    }
    
    .sidebar-header h3 {
      color: white;
      font-size: 15px;
      margin-bottom: 4px;
    }
    
    .sidebar-header p {
      color: rgba(255,255,255,0.7);
      font-size: 10px;
    }
    
    .sidebar-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 12px 16px 12px;
      flex-shrink: 0;
      margin-top: 10px;
    }
    
    .sidebar-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      width: 100%;
    }
    
    .sidebar-btn i {
      width: 22px;
      font-size: 16px;
    }
    
    .sidebar-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: translateX(5px);
    }
    
    .sidebar-btn.active {
      background: #ffb74d;
      color: #1e3a2f;
    }
    
    .sidebar-footer {
      padding: 12px 12px 18px 12px;
      border-top: 1px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
      margin-top: 10px;
    }
    
    .user-status-sidebar {
      background: rgba(255,255,255,0.12);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.7rem;
      margin-bottom: 10px;
      text-align: center;
      word-break: break-word;
      color: white;
    }
    
    .sidebar-login-buttons {
      display: flex;
      gap: 8px;
    }
    
    .sidebar-login-buttons button {
      flex: 1;
      background: white;
      color: #1e4a2f;
      border: none;
      padding: 8px 0;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.75rem;
    }
    
    .sidebar-login-buttons button.logout-btn {
      background: #ff8a5c;
      color: white;
    }
    
    .login-form-sidebar {
      margin-top: 10px;
    }
    
    .login-form-sidebar input {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 8px;
      border-radius: 10px;
      border: none;
      font-size: 0.75rem;
    }
    
    .login-form-sidebar button {
      width: 100%;
      background: #ffb74d;
      color: #1e3a2f;
      border: none;
      padding: 8px;
      border-radius: 10px;
      font-weight: bold;
      margin-bottom: 5px;
      cursor: pointer;
      font-size: 0.75rem;
    }
    
    .login-form-sidebar .cancel-login {
      background: #6c757d;
      color: white;
    }
    
    .error-msg-sidebar {
      color: #ffb3b3;
      font-size: 0.65rem;
      margin-top: 5px;
      text-align: center;
    }
    
    .hamburger-btn {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.3s;
      position: absolute;
      left: 20px;
      top: 20%;
      transform: translateY(-50%);
    }
    
    .hamburger-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-50%) scale(1.05);
    }
    
    .main-container {
      transition: margin-left 0.3s ease;
      width: 100%;
    }
    
    @media (min-width: 769px) {
      .sidebar-overlay { display: block; }
      body.sidebar-open .main-container { margin-left: 280px; }
      .main-container { margin-left: 0; transition: margin-left 0.3s ease; }
      .hamburger-btn { display: flex; }
    }
    
    @media (max-width: 768px) {
      .hamburger-btn { display: flex; }
      .main-container { margin-left: 0; }
      .sidebar { left: -280px; }
      .sidebar.open { left: 0; }
      body.sidebar-open .main-container { margin-left: 0; }
    }
    
    .container {
      max-width: 1400px;
      margin: 20px auto;
      background: white;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(46, 125, 50, 0.25);
      overflow: hidden;
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .header {
      background: linear-gradient(135deg, #2d6a4f 0%, #2e7d32 50%, #2d6a4f 100%);
      color: white;
      padding: 20px 25px;
      text-align: center;
      position: relative;
    }
    
    @media (max-width: 768px) {
      .header { padding: 16px; }
    }
    
    .logo-circle img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid white;
    }
    
    .header h1 {
      font-size: 1.8em;
      margin-bottom: 5px;
      letter-spacing: 0.5px;
      white-space: normal;
    }
    
    .header h4 {
      opacity: 0.85;
      font-size: 12px;
      margin-bottom: 4px;
    }
    
    .header-refresh {
      display: inline-flex;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.3s;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }
    
    .header-refresh:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    
    .filter-section {
      background: white;
      padding: 16px 20px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    
    .filter-group {
      flex: 1;
      min-width: 200px;
    }
    
    .filter-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .filter-group input,
    .filter-group select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.3s;
      background: white;
    }
    
    .filter-group input:focus,
    .filter-group select:focus {
      outline: none;
      border-color: #2e7d32;
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
    }
    
    .reset-btn {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      color: #475569;
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .reset-btn:hover {
      background: #e2e8f0;
    }
    
    .tabs {
      display: flex;
      gap: 6px;
      padding: 14px 16px 0 16px;
      background: white;
      flex-wrap: wrap;
      border-bottom: 2px solid #eef2f7;
    }
    
    .tab-btn {
      background: #e7fde7;
      border: none;
      padding: 10px 20px;
      border-radius: 10px 10px 0 0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s;
      color: #2d6a4f;
      font-family: inherit;
      border-radius: 10px;
    }
    
    .tab-btn:hover {
      background: #e7fde7;
      transform: translateY(-5px);
    }
    
    .tab-btn.active {
      background: linear-gradient(135deg, #2d6a4f 0%, #2e7d32 50%, #2d6a4f 100%);
      color: white;
    }
    
    .content {
      padding: 20px;
      background: white;
      min-height: 500px;
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      color: #2e7d32;
    }
    
    @keyframes bookSpin {
      0%, 100% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(10deg) scale(1.1); }
      75% { transform: rotate(-10deg) scale(1.1); }
    }
    
    .loading .fa-calendar-alt {
      display: inline-block;
      animation: bookSpin 1s ease-in-out infinite;
      font-size: 48px;
      color: #43a047;
      margin-bottom: 15px;
    }
    
    .error {
      background: #fef2f2;
      border-left: 4px solid #ef4444;
      padding: 14px 18px;
      border-radius: 10px;
      color: #b91c1c;
      margin: 20px 0;
    }
    
    /* ========== STYLE KARTU ========== */
    .cards-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: 1px solid #e2e8f0;
    }
    
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(46, 125, 50, 0.12);
      border-color: #c8e6c9;
    }
    
    .card-header {
      background: linear-gradient(135deg, #2d6a4f 0%, #2e7d32 100%);
      color: white;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .card-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1rem;
      flex-wrap: wrap;
    }
    
    .card-header-left i {
      font-size: 1.3rem;
    }
    
    .card-penguji {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.5px;
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 30px;
    }
    
    .card-nama {
      font-weight: 500;
      font-size: 0.9rem;
    }
    
    .card-badge {
      background: rgba(255, 255, 255, 0.2);
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    .card-body {
      padding: 0;
      overflow-x: auto;
    }
    
    .card-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    .card-table th,
    .card-table td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid #eef2f7;
    }
    
    .card-table th {
      background: #f8fafc;
      font-weight: 700;
      color: #2d6a4f;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .card-table tbody tr:hover td {
      background: #f0fdf4;
    }
    
    .card-table td:first-child,
    .card-table th:first-child {
      padding-left: 20px;
    }
    
    .card-table td:last-child,
    .card-table th:last-child {
      padding-right: 20px;
    }
    
    /* Responsive Mobile */
    @media (max-width: 640px) {
      .card-table thead {
        display: none;
      }
      
      .card-table tbody tr {
        display: block;
        margin-bottom: 12px;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px;
        background: #fefefe;
      }
      
      .card-table tbody tr:last-child {
        margin-bottom: 0;
      }
      
      .card-table td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        text-align: right;
        border-bottom: 1px solid #f0f0f0;
        gap: 12px;
      }
      
      .card-table td:last-child {
        border-bottom: none;
      }
      
      .card-table td::before {
        content: attr(data-label);
        font-weight: 700;
        text-align: left;
        color: #2d6a4f;
        font-size: 11px;
        text-transform: uppercase;
        min-width: 100px;
      }
      
      .card-table td:first-child {
        padding-left: 12px;
      }
      
      .card-table td:last-child {
        padding-right: 12px;
      }
      
      .card-header {
        padding: 14px 16px;
      }
      
      .card-penguji, .card-nama {
        font-size: 0.85rem;
      }
    }
    
    @media (min-width: 641px) and (max-width: 768px) {
      .card-table th,
      .card-table td {
        padding: 10px 12px;
        font-size: 12px;
      }
    }
    
    .stats {
      margin-top: 16px;
      padding: 12px 16px;
      background: #f8fafc;
      border-radius: 10px;
      text-align: center;
      color: #475569;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .stats .filter-badge {
      background: #e2e8f0;
      padding: 3px 10px;
      border-radius: 16px;
      font-size: 11px;
      color: #1e293b;
    }
    
    .footer {
      background: #f8fafc;
      padding: 12px;
      text-align: center;
      color: #94a3b8;
      font-size: 11px;
      border-top: 1px solid #e2e8f0;
    }
    
    @media (max-width: 768px) {
      .header h1 { font-size: 1.2em; }
      .tab-btn { padding: 8px 14px; font-size: 11px; }
      .content { padding: 14px; }
      .filter-section { padding: 12px; flex-direction: column; }
      .filter-group { width: 100%; }
      .logo-circle img { width: 50px; height: 50px; }
      .header h4 { font-size: 10px; }
    }
    
    @media print {
      body { background: white; padding: 0; }
      .sidebar, .hamburger-btn, .tabs, .footer, .filter-section { display: none; }
      .container { box-shadow: none; border-radius: 0; margin: 0; }
      .main-container { margin-left: 0; }
    }
    
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(3px);
    }
    
    .loading-card {
      background: white;
      padding: 25px 35px;
      border-radius: 20px;
      text-align: center;
      min-width: 260px;
      max-width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      animation: fadeInUp 0.3s ease;
    }
    
    .loading-card h3 {
      color: #2d6a4f;
      margin-bottom: 15px;
    }
    
    .progress-container {
      width: 100%;
      height: 10px;
      background: #e9f5e6;
      border-radius: 20px;
      overflow: hidden;
      margin: 12px 0;
    }
    
    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #2d6a4f, #40916c, #52b788);
      border-radius: 20px;
      transition: width 0.3s ease;
    }
    
    .loading-percent {
      font-size: 1.5rem;
      font-weight: bold;
      color: #2d6a4f;
      margin: 8px 0;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="logo.png" alt="Logo" class="sidebar-logo" onerror="this.src='https://via.placeholder.com/60'">
      <h3>Lajnah Tahfizh</h3>
      <p>Ma'had Tamaamul Minnah, Bengle - Karawang</p>
    </div>
    
    <div class="sidebar-buttons" id="sidebarNavMenu"></div>
    
    <div class="sidebar-footer">
      <div id="userStatusSidebar" class="user-status-sidebar"></div>
      <div id="sidebarLoginArea">
        <div class="sidebar-login-buttons" id="sidebarBtnGroup">
          <button id="sidebarLoginBtn" onclick="showLoginFormSidebar()">Login</button>
          <button id="sidebarLogoutBtn" onclick="logout()" style="display:none;" class="logout-btn">Logout</button>
        </div>
        <div id="loginFormSidebar" class="login-form-sidebar" style="display:none;">
          <input type="text" id="loginEmailSidebar" placeholder="Email atau ID">
          <input type="password" id="loginPasswordSidebar" placeholder="Password">
          <button onclick="doLoginFromSidebar()">Masuk</button>
          <button onclick="hideLoginFormSidebar()" class="cancel-login">Batal</button>
          <div id="loginErrorSidebar" class="error-msg-sidebar"></div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="main-container" id="mainContainer">
    <div class="container">
      <div class="header">
        <button class="hamburger-btn" id="hamburgerBtn">
          <i class="fas fa-bars"></i> Opsi
        </button>
        
        <div class="logo-circle">
          <img src="logo.png" alt="Logo" class="header-logo" onerror="this.src='https://via.placeholder.com/70'">
        </div>
        <h1>📋 JADWAL PENGUJI AL-QUR'AN</h1>
        <h4>Ma'had Tamaamul Minnah, Bengle - Karawang</h4>
                
        <button class="header-refresh" onclick="loadAllData()">
          <i class="fas fa-sync-alt"></i> Refresh Data
        </button>
      </div>
      
      <div class="filter-section">
        <div class="filter-group">
          <label>🔍 Cari Nama Santri (Peserta Ujian)</label>
          <input type="text" id="searchInput" placeholder="Ketik nama santri..." onkeyup="applyFilters()">
        </div>
        <div class="filter-group">
          <label>💼 Filter Nama Penguji</label>
          <select id="pengujiFilter" onchange="applyFilters()">
            <option value="">Semua Penguji</option>
          </select>
        </div>
        <div class="filter-group">
          <label>&nbsp;</label>
          <button class="reset-btn" onclick="resetFilters()">Reset Filter</button>
        </div>
      </div>
      
      <div class="tabs" id="tabsContainer"></div>
      
      <div class="content">
        <div id="loadingArea">
          <div class="loading">
            <i class="fas fa-calendar-alt"></i>
            <p>Memuat Jadwal Penguji...</p>
          </div>
        </div>
        <div id="errorArea" style="display: none;"></div>
        <div id="tableArea" style="display: none;"></div>
      </div>
      
      <div class="footer">
        <p>© 2026 - Lajnah Tahfizh Banin | Ma'had Tamaamul Minnah, Bengle - Karawang</p>
      </div>
    </div>
  </div>
  
  <script>
    // ========== SIDEBAR TOGGLE ==========
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    
    function toggleSidebar() {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('active');
      const isOpen = sidebar.classList.contains('open');
      localStorage.setItem('sidebarState', isOpen ? 'open' : 'closed');
      if (isOpen) {
        document.body.classList.add('sidebar-open');
        if (hamburgerBtn) hamburgerBtn.innerHTML = '<i class="fas fa-times"></i>';
      } else {
        document.body.classList.remove('sidebar-open');

    function updatePengujiFilter(data) {

      const pengujiFilter = document.getElementById('pengujiFilter');
      
      if (namaPengujiCol === -1) {

        return;
      }
      
      const uniquePenguji = new Set();
      for (let i = 1; i < data.length; i++) {
        const penguji = data[i][namaPengujiCol];
        if (penguji && penguji.toString().trim() !== '') {
          uniquePenguji.add(penguji.toString().trim());
        }
      }
      
      const sorted = Array.from(uniquePenguji).sort();
      pengujiFilter.innerHTML = '<option value="">Semua Penguji</option>';
      sorted.forEach(p => {
        pengujiFilter.innerHTML += `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`;

    function getFilteredData() {
      if (!rawData || rawData.length === 0) return rawData;
      
      const searchSantri = document.getElementById('searchInput').value.toLowerCase().trim();
      const filterPenguji = document.getElementById('pengujiFilter').value;
      
      if (!searchSantri && !filterPenguji) return rawData;
      
      const headers = rawData[0];
      const namaPengujiCol = findNamaPengujiColumn(headers);
      
      // Kumpulkan semua kolom yang berisi nama santri (kolom dengan pola H*S*_N)
      const santriColumns = [];
      for (let i = 0; i < headers.length; i++) {
        const header = String(headers[i] || '').toLowerCase();
        if (header.match(/h\d+s\d+_n/)) {
          santriColumns.push(i);
        }
      }
      
      const selectedIndices = new Set();
      selectedIndices.add(0);
      
      for (let i = 1; i < rawData.length; i++) {
        const row = rawData[i];
        let match = true;
        
        // Filter berdasarkan nama penguji
        if (filterPenguji && namaPengujiCol !== -1) {
          const rowPenguji = row[namaPengujiCol];
          if (!rowPenguji || rowPenguji.toString().trim() !== filterPenguji) {
            match = false;
          }
        }
        
        // Filter berdasarkan nama santri (pencarian)
        if (match && searchSantri) {
          let foundSantri = false;
          for (let col of santriColumns) {
            const santri = row[col];
            if (santri && santri.toString().toLowerCase().includes(searchSantri)) {
              foundSantri = true;
              break;
            }
          }
          if (!foundSantri) match = false;
        }
        
        if (match) selectedIndices.add(i);
      }
      
      const sorted = Array.from(selectedIndices).sort((a, b) => a - b);
      return sorted.map(idx => rawData[idx]);
    }

    // ========== FUNGSI RENDER KARTU ==========
// ========== FUNGSI RENDER KARTU DENGAN FILTER PER BARIS ==========
function renderAsCards(data, merges, searchSantriTerm = '') {
  if (!data || data.length < 2) {
    return `
      <div style="text-align: center; padding: 60px 20px; background: #fef2f2; border-radius: 16px; border: 1px solid #fecaca;">
        <i class="fas fa-database" style="font-size: 48px; color: #ef4444; margin-bottom: 16px; display: block;"></i>
        <h3 style="color: #991b1b; margin-bottom: 8px;">Jadwal Penguji belum tersedia</h3>
        <p style="color: #7f1d1d;">Saat ini belum ada data jadwal penguji.</p>
      </div>
    `;
  }

  const headers = data[0];
  
  // Cari index kolom
  let noCol = -1, kodeCol = -1, namaPengujiCol = -1;
  const sessionColumns = [];
  
  for (let i = 0; i < headers.length; i++) {
    const header = String(headers[i] || '').toLowerCase();
    if (header === 'no' || header === 'nomor') noCol = i;
    else if (header === 'kode' || header === 'kode penguji') kodeCol = i;
    else if (header === 'nama' || header === 'nama penguji' || header === 'penguji') namaPengujiCol = i;
    else {
      const matchN = header.match(/h(\d+)s(\d+)_n/i);
      const matchK = header.match(/h(\d+)s(\d+)_k/i);
      const matchJ = header.match(/h(\d+)s(\d+)_j/i);
      
      if (matchN) {
        const hari = parseInt(matchN[1]);
        const sesi = parseInt(matchN[2]);
        const sessionId = `H${hari}S${sesi}`;
        if (!sessionColumns[sessionId]) {
          sessionColumns[sessionId] = { hari, sesi, sessionId, nameCol: i, classCol: -1, juzCol: -1 };
        } else {
          sessionColumns[sessionId].nameCol = i;
        }
      }
      else if (matchK) {
        const hari = parseInt(matchK[1]);
        const sesi = parseInt(matchK[2]);
        const sessionId = `H${hari}S${sesi}`;
        if (!sessionColumns[sessionId]) {
          sessionColumns[sessionId] = { hari, sesi, sessionId, nameCol: -1, classCol: i, juzCol: -1 };
        } else {
          sessionColumns[sessionId].classCol = i;
        }
      }
      else if (matchJ) {
        const hari = parseInt(matchJ[1]);
        const sesi = parseInt(matchJ[2]);
        const sessionId = `H${hari}S${sesi}`;
        if (!sessionColumns[sessionId]) {
          sessionColumns[sessionId] = { hari, sesi, sessionId, nameCol: -1, classCol: -1, juzCol: i };
        } else {
          sessionColumns[sessionId].juzCol = i;
        }
      }
    }
  }
  
  const validSessions = Object.values(sessionColumns).filter(s => s.nameCol !== -1);
  validSessions.sort((a, b) => {
    if (a.hari !== b.hari) return a.hari - b.hari;
    return a.sesi - b.sesi;
  });
  
  let cardsHtml = '<div class="cards-container">';
  const searchLower = searchSantriTerm.toLowerCase().trim();
  
  for (let rowIdx = 1; rowIdx < data.length; rowIdx++) {
    const row = data[rowIdx];
    
    const kode = (kodeCol !== -1 && row[kodeCol]) ? row[kodeCol].toString() : '-';
    const namaPenguji = (namaPengujiCol !== -1 && row[namaPengujiCol]) ? row[namaPengujiCol].toString() : '';
    const nomor = (noCol !== -1 && row[noCol]) ? row[noCol] : rowIdx;
    
    // Kumpulkan data per sesi, tapi FILTER berdasarkan search santri
    const sessionRows = [];
    let hasMatch = false;
    
    for (let session of validSessions) {
      const namaPeserta = (session.nameCol !== -1 && row[session.nameCol]) ? row[session.nameCol].toString().trim() : '';
      if (!namaPeserta || namaPeserta === '') continue;
      
      // Cek apakah nama peserta cocok dengan pencarian
      let isMatch = true;
      if (searchLower) {
        isMatch = namaPeserta.toLowerCase().includes(searchLower);
      }
      
      // Selalu tambahkan ke sessionRows, tapi tandai apakah match atau tidak
      sessionRows.push({
        hari: session.hari,
        sesi: session.sesi,
        nama: namaPeserta,
        kelas: (session.classCol !== -1 && row[session.classCol]) ? row[session.classCol].toString() : '-',
        juz: (session.juzCol !== -1 && row[session.juzCol]) ? row[session.juzCol].toString() : '-',
        isMatch: isMatch  // tambahkan flag apakah baris ini cocok dengan pencarian
      });
      
      if (isMatch) hasMatch = true;
    }
    
    // Jika ada pencarian dan tidak ada satupun baris yang cocok, skip kartu ini
    if (searchLower && !hasMatch) continue;
    
    if (sessionRows.length === 0) continue;
    
    // Buat kartu - hanya tampilkan baris yang match (atau semua jika tidak ada pencarian)
    const visibleRows = searchLower ? sessionRows.filter(row => row.isMatch) : sessionRows;
    
    if (visibleRows.length === 0) continue;
    
    cardsHtml += `
      <div class="card">
        <div class="card-header">
          <div class="card-header-left">
            <i class="fas fa-chalkboard-user"></i> Kode: 
            ${kode !== '-' ? `<span class="card-penguji">${escapeHtml(kode)}</span>` : ''}
            ${namaPenguji ? `<span class="card-nama">${escapeHtml(namaPenguji)}</span>` : ''}
          </div>
          <div class="card-badge">No. ${nomor}</div>
        </div>
        <div class="card-body">
          <table class="card-table">
            <thead>
              <tr>
                <th>📅 Hari</th>
                <th>⏰ Sesi</th>
                <th>🎓 Nama Santri</th>
                <th>🏫 Kelas</th>
                <th>📖 Juz</th>
              </tr>
            </thead>
            <tbody>
              ${visibleRows.map(sesi => `
                <tr>
                  <td data-label="Hari">Hari ke-${sesi.hari}</td>
                  <td data-label="Sesi">Sesi ${sesi.sesi}</td>
                  <td data-label="Nama Santri">${escapeHtml(sesi.nama)}</td>
                  <td data-label="Kelas">${escapeHtml(sesi.kelas)}</td>
                  <td data-label="Juz">${escapeHtml(sesi.juz)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }
  
  cardsHtml += '</div>';
  return cardsHtml;
}

// ========== RENDER TABLE ==========
function renderTable() {
  const container = document.getElementById('tableArea');
  
  // Ambil filter pencarian santri
  const searchSantri = document.getElementById('searchInput').value;
  const filterPenguji = document.getElementById('pengujiFilter').value;
  
  // Filter data berdasarkan penguji dulu (seperti sebelumnya)
  let filteredData = rawData;
  
  if (filteredData && filteredData.length > 1) {
    const headers = filteredData[0];
    const namaPengujiCol = (() => {
      for (let i = 0; i < headers.length; i++) {
        const h = String(headers[i] || '').toLowerCase();
        if (h === 'nama' || h === 'nama penguji' || h === 'penguji') return i;
      }
      return -1;
    })();
    
    // Filter berdasarkan nama penguji (dropdown)
    if (filterPenguji && namaPengujiCol !== -1) {
      const newData = [filteredData[0]];
      for (let i = 1; i < filteredData.length; i++) {
        const rowPenguji = filteredData[i][namaPengujiCol];
        if (rowPenguji && rowPenguji.toString().trim() === filterPenguji) {
          newData.push(filteredData[i]);
        }
      }
      filteredData = newData;
    }
  }
  
  if (!filteredData || filteredData.length <= 1) {
        container.innerHTML = `
          <div style="text-align: center; padding: 60px 20px; background: #fef2f2; border-radius: 16px; border: 1px solid #fecaca;">
            <i class="fas fa-database" style="font-size: 48px; color: #ef4444; margin-bottom: 16px; display: block;"></i>
            <h3 style="color: #991b1b; margin-bottom: 8px;"> Jadwal Penguji belum tersedia</h3>
            <p style="color: #7f1d1d; margin-bottom: 16px;">Saat ini belum ada data Jadwal Penguji atau filter keliru.</p>
            <p style="color: #b91c1c; font-size: 13px;"><i class="fas fa-envelope"></i> Silakan hubungi Operator untuk menambahkan data.</p>
          </div>
        `;
    document.getElementById('loadingArea').style.display = 'none';
    container.style.display = 'block';
    return;
  }
  
  // RENDER KARTU dengan parameter search santri
  const cardsHtml = renderAsCards(filteredData, rawMerges, searchSantri);
  container.innerHTML = cardsHtml;
  
  // Statistik
  let filterText = '';
  if (searchSantri && filterPenguji) filterText = `🔍 "${searchSantri}" + Penguji: ${filterPenguji}`;
  else if (searchSantri) filterText = `🔍 Cari Santri: "${searchSantri}"`;
  else if (filterPenguji) filterText = `💼 Penguji: ${filterPenguji}`;
  
  const filterBadge = filterText ? `<span class="filter-badge">${filterText}</span>` : '';
  const dataCount = filteredData.length - 1;
  
  const statsHtml = `<div class="stats">
    <span>📊 <strong>${dataCount} Penguji ditemukan</strong></span>
    <span>🕒 Update: ${new Date().toLocaleString('id-ID')}</span>
    ${filterBadge}
  </div>`;
  
  const oldStats = container.querySelector('.stats');
  if (oldStats) oldStats.remove();
  container.innerHTML += statsHtml;
  
  document.getElementById('loadingArea').style.display = 'none';
  container.style.display = 'block';
}
    
    function applyFilters() {
      if (rawData) renderTable();
    }
    
    function resetFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('pengujiFilter').value = '';
      if (rawData) renderTable();
    }
    
    function escapeHtml(text) {
      if (text === undefined || text === null) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // ========== INIT ==========
    loadSidebarState();
    loadStoredUser();
    checkAuth();
    loadAllData();
  </script>
</body>
</html>
