<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Penguji Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 28px;
            margin-bottom: 24px;
        }
        h1 { color: #1a1a2e; margin-bottom: 8px; font-size: 26px; }
        .subtitle { color: #666; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #667eea; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }
        .info-box {
            background: #e0f2fe;
            padding: 14px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #0284c7;
        }
        .info-box.error { background: #fee2e2; color: #991b1b; border-left-color: #dc2626; }
        .info-box.success { background: #d1fae5; color: #065f46; border-left-color: #10b981; }
        .button-group { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
        button {
            background: #4361ee;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        button:hover:not(:disabled) { background: #3a56d4; transform: translateY(-2px); }
        .btn-success { background: #10b981; }
        .btn-warning { background: #f59e0b; }
        button:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }
        .preview-table-wrapper { overflow-x: auto; margin-top: 16px; border: 1px solid #ddd; border-radius: 8px; max-height: 300px; overflow-y: auto; }
        .preview-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .preview-table th { background: #374151; color: white; padding: 6px; text-align: center; }
        .preview-table td { padding: 4px; text-align: center; border: 1px solid #ddd; }
        .main-table-wrapper { overflow-x: auto; margin-top: 20px; border: 1px solid #ddd; border-radius: 12px; max-height: 500px; overflow-y: auto; }
        .main-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .main-table th { background: #1a1a2e; color: white; padding: 12px 6px; text-align: center; border: 1px solid #334155; position: sticky; top: 0; }
        .main-table td { padding: 10px 6px; text-align: center; border: 1px solid #ddd; }
        .main-table tr:nth-child(even) { background: #f8fafc; }
        .loading { display: none; text-align: center; padding: 40px; }
        .spinner { width: 50px; height: 50px; border: 4px solid #e5e7eb; border-top-color: #4361ee; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .stat-grid { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }
        .stat-card { background: #f3f4f6; padding: 14px 20px; border-radius: 12px; flex: 1; min-width: 100px; text-align: center; }
        .stat-number { font-size: 28px; font-weight: bold; color: #4361ee; }
        .stat-label { font-size: 12px; color: #6b7280; margin-top: 4px; }
        .info-api {
            background: #f1f5f9;
            padding: 10px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #334155;
            text-align: center;
            word-break: break-all;
        }
        @media (max-width: 768px) {
            .card { padding: 16px; }
            button { padding: 8px 16px; font-size: 12px; }
        }
    </style>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📋 Jadwal Penguji Generator</h1>
            <div class="subtitle">Data dari Google Sheet → Generate jadwal per penguji</div>


            <div class="form-group">
                <label>📄 Pilih Sheet (Data Jadwal Santri)</label>
                <select id="sheetSelect" onchange="onSheetChange()" disabled>
                    <option value="">-- Load daftar sheet terlebih dahulu --</option>
                </select>
            </div>

            <div id="previewCard" style="display:none;">
                <label>🔍 Preview Data (10 baris pertama)</label>
                <div class="preview-table-wrapper" id="previewContainer"></div>
            </div>

            <div class="button-group">
                <button id="loadBtn" onclick="loadSheetList()">📥 Load Daftar Sheet</button>
                <button id="processBtn" onclick="generateJadwal()" disabled>🔄 Generate Jadwal Penguji</button>
                <button id="exportBtn" onclick="exportToExcel()" class="btn-success" disabled>📎 Export ke Excel</button>
                <button id="printBtn" onclick="printJadwal()" class="btn-warning" disabled>🖨️ Print</button>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <div>Memproses data...</div>
            </div>
        </div>

        <div id="infoCard" class="card" style="display:none;">
            <div id="infoBox" class="info-box"></div>
        </div>

        <div id="resultCard" class="card" style="display:none;">
            <h2>📊 Hasil Jadwal Penguji</h2>
            <div id="statContainer" class="stat-grid"></div>
            <div class="main-table-wrapper" id="tableContainer"></div>
        </div>
    </div>

    <script>
        // ==================== KONFIGURASI HARDCODE ====================
        // GANTI DENGAN URL APPS SCRIPT ANDA (HARDCODE DI HTML)
        const API_URL = "https://script.google.com/macros/s/AKfycbyx7SnpMgh6uV7VMotin3UqO1_q3fZUD-sBGQUXPsf7ivUVMbG9YHMLmGZXTdbcrpSu/exec";
        // ==============================================================

        let currentRawData = null;
        let currentResult = null;
        let currentSheetName = null;

        document.getElementById('apiUrlDisplay').textContent = API_URL;

        async function callApi(action, sheetName = null) {
            let url = `${API_URL}?action=${action}`;
            if (sheetName) url += `&sheetName=${encodeURIComponent(sheetName)}`;
            
            const response = await fetch(url);
            if (!response.ok) throw new Error('HTTP ' + response.status);
            return await response.json();
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showInfo(message, type) {
            const infoCard = document.getElementById('infoCard');
            const infoBox = document.getElementById('infoBox');
            infoBox.textContent = message;
            infoBox.className = 'info-box ' + (type || 'info');
            infoCard.style.display = 'block';
            if (type !== 'error') {
                setTimeout(() => infoCard.style.display = 'none', 4000);
            }
        }

        async function loadSheetList() {
            showLoading(true);
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('previewCard').style.display = 'none';
            
            try {
                const response = await callApi('getSheets');
                if (response.sheets && response.sheets.length > 0) {
                    const select = document.getElementById('sheetSelect');
                    select.innerHTML = '<option value="">-- Pilih sheet --</option>';
                    select.disabled = false;
                    
                    for (let i = 0; i < response.sheets.length; i++) {
                        const sheetName = response.sheets[i];
                        const option = document.createElement('option');
                        option.value = sheetName;
                        option.textContent = sheetName;
                        select.appendChild(option);
                    }
                    
                    showInfo('✅ Berhasil memuat ' + response.sheets.length + ' sheet', 'success');
                    document.getElementById('processBtn').disabled = true;
                } else {
                    showInfo('❌ Tidak ada sheet ditemukan', 'error');
                }
            } catch (error) {
                showInfo('❌ Gagal: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        async function onSheetChange() {
            const select = document.getElementById('sheetSelect');
            const sheetName = select.value;
            
            if (!sheetName) {
                document.getElementById('previewCard').style.display = 'none';
                document.getElementById('processBtn').disabled = true;
                return;
            }
            
            currentSheetName = sheetName;
            showLoading(true);
            
            try {
                const response = await callApi('getData', sheetName);
                if (response.data) {
                    currentRawData = response.data;
                    showPreview(response.data);
                    document.getElementById('processBtn').disabled = false;
                    showInfo('✅ Sheet "' + sheetName + '" siap diproses. ' + response.data.length + ' baris.', 'success');
                } else {
                    showInfo('❌ ' + (response.error || 'Gagal mengambil data'), 'error');
                }
            } catch (error) {
                showInfo('❌ Gagal: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        function showPreview(data) {
            if (!data || data.length === 0) {
                document.getElementById('previewCard').style.display = 'none';
                return;
            }
            
            const previewData = data.slice(0, 10);
            let maxCols = 0;
            for (let i = 0; i < previewData.length; i++) {
                if (previewData[i].length > maxCols) maxCols = previewData[i].length;
            }
            
            let html = '<table class="preview-table"><thead><tr>';
            for (let i = 0; i < maxCols; i++) {
                let headerText = '';
                if (i === 0) headerText = 'No';
                else if (i === 1) headerText = 'Nama';
                else if (i === 2) headerText = 'Kelas';
                else if (i === 3) headerText = 'Juz';
                else headerText = 'Kol ' + (i+1);
                html += '<th>' + headerText + '</th>';
            }
            html += '</thead><tbody>';
            
            for (let row of previewData) {
                html += '<tr>';
                for (let c = 0; c < maxCols; c++) {
                    let val = (row[c] !== undefined && row[c] !== null && row[c] !== '') ? row[c] : '';
                    if (val === '') val = '-';
                    html += '<td>' + escapeHtml(val.toString()) + '</td>';
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            document.getElementById('previewContainer').innerHTML = html;
            document.getElementById('previewCard').style.display = 'block';
        }

        // ==================== GENERATE JADWAL PENGUJI ====================
// ==================== GENERATE JADWAL PENGUJI ====================
// ==================== GENERATE JADWAL PENGUJI ====================
function generateJadwal() {
    if (!currentRawData) {
        showInfo('Tidak ada data. Load sheet dahulu.', 'error');
        return;
    }
    
    showLoading(true);
    
    try {
        const data = currentRawData;
        if (data.length < 3) throw new Error('Data minimal 3 baris (2 header + 1 data)');
        
        // Header
        const mainHeader = data[0];
        const sesiRow = data[1] || [];
        
        // Cari kolom awal sesi (setelah No, Nama, Kelas, Juz)
        let startCol = 4;
        for (let i = 0; i < mainHeader.length; i++) {
            const headerVal = mainHeader[i] ? mainHeader[i].toString().toLowerCase() : '';
            if (headerVal.indexOf('hari') !== -1) {
                startCol = i;
                break;
            }
        }
        
        // ===== KUMPULKAN SEMUA SESI =====
        const sessions = [];
        let currentHari = 1;
        let lastSesiNum = 0;
        
        for (let i = startCol; i < sesiRow.length; i++) {
            const sesiNum = sesiRow[i];
            if (sesiNum !== undefined && sesiNum !== null && sesiNum.toString().trim() !== '') {
                const sesiValue = sesiNum.toString().trim();
                const sesiNumber = parseInt(sesiValue);
                
                if (!isNaN(sesiNumber)) {
                    if (sesiNumber < lastSesiNum) {
                        currentHari++;
                    }
                    lastSesiNum = sesiNumber;
                    
                    sessions.push({
                        colIndex: i,
                        sesiNumber: sesiNumber,
                        hari: currentHari,
                        hariSesiKey: 'H' + currentHari + 'S' + sesiNumber
                    });
                }
            }
        }
        
        // Jika tidak ada data sesi, fallback
        if (sessions.length === 0) {
            let tempHari = 1;
            for (let i = startCol; i < sesiRow.length; i++) {
                const sesiNumber = (i - startCol) % 6 + 1;
                if (sesiNumber === 1 && i > startCol) tempHari++;
                sessions.push({
                    colIndex: i,
                    sesiNumber: sesiNumber,
                    hari: tempHari,
                    hariSesiKey: 'H' + tempHari + 'S' + sesiNumber
                });
            }
        }
        
        // ===== PROSES DATA SANTRI =====
        const pengujiMap = new Map();
        
        for (let rowIdx = 2; rowIdx < data.length; rowIdx += 2) {
            const juzRow = data[rowIdx];
            const pengujiRow = data[rowIdx + 1];
            if (!juzRow) continue;
            
            const nama = juzRow[1] ? juzRow[1].toString().trim() : '';
            const kelas = juzRow[2] ? juzRow[2].toString().trim() : '';
            
            if (nama === '') continue;
            
            for (let s = 0; s < sessions.length; s++) {
                const sess = sessions[s];
                const colIdx = sess.colIndex;
                
                let juzUjian = (colIdx < juzRow.length && juzRow[colIdx] !== undefined && juzRow[colIdx] !== null && juzRow[colIdx] !== '') 
                            ? juzRow[colIdx].toString().trim() : '';
                
                let penguji = '';
                if (pengujiRow && colIdx < pengujiRow.length && pengujiRow[colIdx] !== undefined && pengujiRow[colIdx] !== null && pengujiRow[colIdx] !== '') {
                    penguji = pengujiRow[colIdx].toString().trim();
                }
                
                if (juzUjian !== '' && penguji !== '' && penguji !== '-') {
                    if (!pengujiMap.has(penguji)) {
                        pengujiMap.set(penguji, []);
                    }
                    pengujiMap.get(penguji).push({
                        nama: nama,
                        kelas: kelas,
                        juzUjian: juzUjian,
                        sessionIndex: s,
                        hariSesiKey: sess.hariSesiKey
                    });
                }
            }
        }
        
        if (pengujiMap.size === 0) {
            throw new Error('Tidak ada data ujian ditemukan.');
        }
        
        // Urutkan data setiap penguji
        for (let items of pengujiMap.values()) {
            items.sort((a, b) => a.sessionIndex - b.sessionIndex);
        }
        
        // ===== BUAT RESULT ROWS =====
        const resultRows = [];
        let rowNum = 1;
        const sortedPenguji = Array.from(pengujiMap.keys()).sort();
        
        // Siapkan semua kemungkinan header keys
        const allSessionKeys = [];
        for (let sess of sessions) {
            allSessionKeys.push(sess.hariSesiKey + '_N');
            allSessionKeys.push(sess.hariSesiKey + '_K');
            allSessionKeys.push(sess.hariSesiKey + '_J');
        }
        
        for (let penguji of sortedPenguji) {
            const items = pengujiMap.get(penguji);
            
            // PASTIKAN: no dan kodePenguji terisi
            const row = {};
            row['No'] = rowNum++;          // <-- Pakai string 'No'
            row['Kode Penguji'] = penguji; // <-- Pakai string 'Kode Penguji'
            
            // Inisialisasi semua kolom sesi dengan '-'
            for (let key of allSessionKeys) {
                row[key] = '-';
            }
            
            // Isi data
            for (let item of items) {
                const sess = sessions[item.sessionIndex];
                if (sess) {
                    row[sess.hariSesiKey + '_N'] = item.nama;
                    row[sess.hariSesiKey + '_K'] = item.kelas;
                    row[sess.hariSesiKey + '_J'] = item.juzUjian;
                }
            }
            resultRows.push(row);
        }
        
        // Buat headers (urutan tetap)
        const headers = ['No', 'Kode Penguji'];
        for (let sess of sessions) {
            headers.push(sess.hariSesiKey + '_N');
            headers.push(sess.hariSesiKey + '_K');
            headers.push(sess.hariSesiKey + '_J');
        }
        
        currentResult = {
            headers: headers,
            rows: resultRows,
            sessions: sessions,
            totalPenguji: resultRows.length,
            totalRecords: Array.from(pengujiMap.values()).reduce((sum, items) => sum + items.length, 0)
        };
        
        renderResult();
        showInfo('✅ Generate selesai! ' + resultRows.length + ' penguji ditemukan: ' + sortedPenguji.join(', '), 'success');
        document.getElementById('exportBtn').disabled = false;
        document.getElementById('printBtn').disabled = false;
        document.getElementById('resultCard').style.display = 'block';
        
    } catch (err) {
        showInfo('❌ ' + err.message, 'error');
    } finally {
        showLoading(false);
    }
}

function renderResult() {
    // Tampilkan statistik
    let sessionInfo = '';
    let currentHari = 0;
    let sesiList = [];
    for (let sess of currentResult.sessions) {
        if (sess.hari !== currentHari) {
            if (currentHari > 0) {
                sessionInfo += `Hari ${currentHari}: Sesi ${sesiList.join(', ')}<br>`;
            }
            currentHari = sess.hari;
            sesiList = [];
        }
        sesiList.push(sess.sesiNumber);
    }
    if (currentHari > 0) {
        sessionInfo += `Hari ${currentHari}: Sesi ${sesiList.join(', ')}<br>`;
    }
    
    // Tampilkan daftar penguji
    const daftarPenguji = currentResult.rows.map(r => r['Kode Penguji']).join(', ');
    
    document.getElementById('statContainer').innerHTML = `
        <div class="stat-card"><div class="stat-number">${currentResult.totalPenguji}</div><div class="stat-label">Total Penguji</div></div>
        <div class="stat-card"><div class="stat-number">${currentResult.sessions.length}</div><div class="stat-label">Total Slot Sesi</div></div>
        <div class="stat-card"><div class="stat-number">${currentResult.totalRecords}</div><div class="stat-label">Total Ujian</div></div>
        <div class="stat-card"><div class="stat-number" style="font-size:14px">${daftarPenguji}</div><div class="stat-label">Daftar Penguji</div></div>
    `;
    
    // Info struktur sesi
    const existingInfo = document.getElementById('sessionInfo');
    if (existingInfo) existingInfo.remove();
    
    const infoDiv = document.createElement('div');
    infoDiv.id = 'sessionInfo';
    infoDiv.style.background = '#e0f2fe';
    infoDiv.style.padding = '10px';
    infoDiv.style.borderRadius = '8px';
    infoDiv.style.marginBottom = '15px';
    infoDiv.style.fontSize = '12px';
    infoDiv.innerHTML = `<strong>📋 Struktur Sesi:</strong><br>${sessionInfo}`;
    document.getElementById('statContainer').after(infoDiv);
    
    // Render tabel
    let html = '<table class="main-table"><thead><tr>';
    for (let h of currentResult.headers) {
        let displayHeader = h;
        if (h !== 'No' && h !== 'Kode Penguji') {
            displayHeader = h.replace(/_N$/, '').replace(/_K$/, '').replace(/_J$/, '');
            const suffix = h.slice(-1);
            if (suffix === 'N') displayHeader += ' (Nama)';
            else if (suffix === 'K') displayHeader += ' (Kelas)';
            else if (suffix === 'J') displayHeader += ' (Juz)';
        }
        html += '<th>' + displayHeader + '</th>';
    }
    html += '</thead><tbody>';
    
    for (let row of currentResult.rows) {
        html += '<tr>';
        for (let h of currentResult.headers) {
            let val = row[h] !== undefined && row[h] !== null ? row[h] : '-';
            if (val === '') val = '-';
            // Warna khusus untuk kolom No dan Kode Penguji
            if (h === 'No' || h === 'Kode Penguji') {
                html += '<td style="font-weight:bold; background:#e0e7ff;">' + escapeHtml(val.toString()) + '</td>';
            } else {
                html += '<td>' + escapeHtml(val.toString()) + '</td>';
            }
        }
        html += '</tr>';
    }
    html += '</tbody><table>';
    document.getElementById('tableContainer').innerHTML = html;
}
        function exportToExcel() {
            if (!currentResult) return;
            
            const sheetData = [currentResult.headers];
            for (let row of currentResult.rows) {
                const rowData = [];
                for (let h of currentResult.headers) {
                    let val = row[h] !== undefined && row[h] !== null ? row[h] : '-';
                    if (val === '') val = '-';
                    rowData.push(val);
                }
                sheetData.push(rowData);
            }
            
            const ws = XLSX.utils.aoa_to_sheet(sheetData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Jadwal_Penguji');
            XLSX.writeFile(wb, 'Jadwal_Penguji_' + new Date().toISOString().slice(0,19) + '.xlsx');
        }

        function printJadwal() {
            if (!currentResult) return;
            
            const win = window.open('', '_blank');
            let html = '<html><head><title>Jadwal Penguji</title>';
            html += '<style>body{font-family:Arial;margin:20px}table{border-collapse:collapse;width:100%}th{background:#1a1a2e;color:white;padding:8px}td{padding:6px;border:1px solid #ccc;text-align:center}</style>';
            html += '</head><body>';
            html += '<h2 style="text-align:center">Jadwal Penguji</h2>';
            html += '<table><thead><tr>';
            for (let h of currentResult.headers) html += '<th>' + h + '</th>';
            html += '</tr></thead><tbody>';
            for (let row of currentResult.rows) {
                html += '<tr>';
                for (let h of currentResult.headers) {
                    let val = row[h] !== undefined && row[h] !== null ? row[h] : '-';
                    if (val === '') val = '-';
                    html += '<td>' + escapeHtml(val.toString()) + '</td>';
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            html += '<p style="text-align:center;margin-top:20px">Dicetak: ' + new Date().toLocaleString() + '</p>';
            html += '</body></html>';
            win.document.write(html);
            win.document.close();
            win.print();
        }

        function escapeHtml(str) {
            if (!str) return '-';
            return str.toString().replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        window.addEventListener('load', function() {
            loadSheetList();
        });
    </script>
</body>
</html>
